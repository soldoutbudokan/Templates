name: Refresh Tilt Data

on:
  schedule:
    # Twice daily, locked to EDT (3 PM and 10 PM EDT = 19:00 UTC and 02:00 UTC).
    # GitHub Actions cron is UTC and ignores DST; this drifts to 2 PM / 9 PM
    # during EST winter, which is fine — IPL season is during EDT.
    - cron: '0 19,2 * * *'
  workflow_dispatch:

permissions:
  contents: write

# Serialize pipeline runs (issue #196): shared group with
# retrain-tilt-model.yml so a refresh can't race the seasonal retrain (or a
# second refresh) and clobber its push.
concurrency:
  group: tilt-pipeline
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TheTilt

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: TheTilt/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data-only refresh (no retrain)
        run: python -c "from pipeline.run_pipeline import refresh_tilt_data_only; refresh_tilt_data_only()"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # --autostash: the pipeline leaves regenerated public/data/ files unstaged,
          # which blocks plain `pull --rebase`. Stash → rebase → pop handles it.
          git pull --rebase --autostash origin master
          git add public/data/
          git commit -m "chore: refresh Tilt data ($(date -u +%Y-%m-%d-%H%MZ))"
          git push
