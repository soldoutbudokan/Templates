name: Refresh Tilt Data

on:
  schedule:
    # Run every Monday at 6am UTC (during IPL season, Cricsheet updates within a day)
    - cron: '0 6 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TheTilt

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: TheTilt/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python pipeline/run_pipeline.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git commit -m "chore: refresh Tilt data ($(date -u +%Y-%m-%d))"
          git push
