name: Retrain Tilt Model

on:
  schedule:
    # March 1st at 06:00 UTC — pre-IPL season retrain
    - cron: '0 6 1 3 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TheTilt

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: TheTilt/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full pipeline (with model training)
        run: python pipeline/run_pipeline.py

      - name: Check for changes
        id: changes
        run: |
          git add -A
          git diff --cached --quiet public/data/ models/win_prob_lgbm.pkl && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT
          git reset

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # --autostash: the pipeline leaves regenerated public/data/ and model
          # pickle unstaged, which blocks plain `pull --rebase`.
          git pull --rebase --autostash origin master
          git add public/data/ models/win_prob_lgbm.pkl
          git commit -m "chore: retrain Tilt model and refresh data ($(date -u +%Y-%m-%d))"
          git push
