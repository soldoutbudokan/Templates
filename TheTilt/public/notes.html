<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The TILT | Notes</title>
    <meta name="description" content="Essays and analysis on TILT, IPL win probability, and cricket momentum.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://thetilt-rust.vercel.app/notes.html">
    <meta property="og:title" content="The TILT | Notes">
    <meta property="og:description" content="Essays and analysis on TILT, IPL win probability, and cricket momentum.">
    <meta property="og:image" content="https://thetilt-rust.vercel.app/assets/crest.png">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="The TILT | Notes">
    <meta name="twitter:description" content="Essays and analysis on TILT, IPL win probability, and cricket momentum.">
    <meta name="twitter:image" content="https://thetilt-rust.vercel.app/assets/crest.png">
    <link rel="icon" type="image/svg+xml" href="assets/crest-icon.svg">
    <link rel="alternate icon" type="image/png" href="assets/crest-icon.png">
    <link rel="stylesheet" href="style.css">
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');</script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
    <style>
        /* Notes listing */
        .notes-list { display: flex; flex-direction: column; gap: 16px; margin-top: 20px; }
        .note-card {
            display: block; text-decoration: none; color: inherit;
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md);
            padding: 20px 24px; cursor: pointer; transition: all 0.15s;
        }
        .note-card:hover { border-color: var(--accent-green); background: var(--bg-hover); }
        .note-card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 6px; color: var(--text-primary); }
        .note-card p { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.6; margin: 0; }
        .note-card .note-meta { font-size: 0.7rem; color: var(--text-muted); margin-top: 8px; }
        .note-tag {
            display: inline-block; font-size: 0.65rem; padding: 2px 8px; border-radius: 10px;
            background: var(--accent-green-dim); color: var(--accent-green); margin-right: 6px;
        }

        /* Back button */
        .back-link {
            display: inline-block; font-size: 0.8rem; color: var(--text-muted);
            text-decoration: none; margin-bottom: 16px;
        }
        .back-link:hover { color: var(--accent-green); }

        /* .note-article rules live in style.css (shared with about.html). */
    </style>
</head>
<body>
    <nav class="top-nav"></nav>
    <script src="common.js"></script>
    <script>initNav('notes');</script>

    <div class="container">
        <div id="listing">
            <div class="page-header">
                <h1>Why Is My Favourite Player Rated So Low?</h1>
                <div class="subtitle">deep dives into how TILT works, where it disagrees with conventional wisdom, and why</div>
            </div>
            <div class="notes-list" id="notesList"></div>
        </div>

        <div id="article" style="display:none">
            <a href="#" class="back-link" id="backLink">&larr; back to notes</a>
            <div class="note-article" id="noteContent"></div>
        </div>

        <div class="footer">
            data from <a href="https://cricsheet.org">cricsheet.org</a> |
            <a href="index.html">back to TILT</a>
        </div>
    </div>

<script>
// NOTES is sourced from common.js BLOG_NOTES (single source of truth, also
// consumed by the homepage). Append new posts there.
const NOTES = window.BLOG_NOTES;

function renderListing() {
    const list = document.getElementById('notesList');
    list.innerHTML = NOTES.map(n => `
        <a href="notes.html?note=${n.id}" class="note-card" data-id="${n.id}">
            <h3>${n.title}</h3>
            <p>${n.summary}</p>
            <div class="note-meta">
                ${n.tags.map(t => `<span class="note-tag">${t}</span>`).join('')}
                <span>${n.date}</span>
            </div>
        </a>
    `).join('');

    list.querySelectorAll('.note-card').forEach(card => {
        card.addEventListener('click', (e) => {
            e.preventDefault();
            loadNote(card.dataset.id);
        });
    });
}

async function loadNote(id, push = true) {
    try {
        const res = await fetch(`notes/${id}.md`);
        if (!res.ok) throw new Error('not found');
        const md = await res.text();

        document.getElementById('listing').style.display = 'none';
        document.getElementById('article').style.display = '';

        // Rebase relative image paths from notes/ context to page context
        const renderer = new marked.Renderer();
        const defaultImage = renderer.image.bind(renderer);
        renderer.image = function({ href, title, text }) {
            if (href && !href.startsWith('http') && !href.startsWith('/')) {
                href = 'notes/' + href;
            }
            return defaultImage({ href, title, text });
        };
        const html = marked.parse(md, { renderer });
        document.getElementById('noteContent').innerHTML = html;
        await hydrateNoteAnchors();

        // Update page title
        const note = NOTES.find(n => n.id === id);
        if (note) document.title = `The TILT | ${note.title}`;

        // Update URL without reload. Only push a new history entry for a
        // user-initiated open; when restoring from popstate or an initial
        // deep-link, replace in place so the back/forward stack stays intact.
        const url = `notes.html?note=${id}`;
        if (push) history.pushState({ note: id }, '', url);
        else history.replaceState({ note: id }, '', url);

        window.scrollTo(0, 0);
    } catch (e) {
        document.getElementById('noteContent').innerHTML = '<div class="loading">note not found</div>';
    }
}

// Some notes embed live anchors that must not drift from the data (see
// dependencies.md): ensemble.md career-match counts + ABD floor/total ranks;
// innings-boundary.md the ABD/B Kumar (#111) rank inversion (ib-* spans);
// all-rounders.md the floor-top-100 cohort count + named-player floor/raw/tilt
// cells (ar-* spans); and last-ball-snap.md the top-5 single-game bowling table.
// After a note renders, populate whichever placeholder elements are present in
// it from the live JSON, leaving the markdown's hard-coded fallbacks if a fetch
// fails.
async function hydrateNoteAnchors() {
    const has = id => document.getElementById(id);
    const needRankings = has('ens-kumar-mt') || has('ens-abd-mt') || has('ens-abd-total-rank') || has('ens-abd-floor-rank')
        || has('ib-abd-total-rank') || has('ib-top10-table') || has('ar-floor-top100-count');
    const needGoats = has('snap-top5-bowling');
    const needPlayers = has('kp-kohli-2016-tpm');
    if (!needRankings && !needGoats && !needPlayers) return;

    const setText = (id, v) => { const el = document.getElementById(id); if (el && v != null) el.textContent = v; };
    try {
        const [rankings, goats] = await Promise.all([
            needRankings ? fetch('data/tilt_rankings.json').then(r => r.ok ? r.json() : null) : null,
            needGoats ? fetch('data/goats.json').then(r => r.ok ? r.json() : null) : null,
        ]);

        if (rankings) {
            const bySlug = s => rankings.find(p => p.slug === s);
            const byTotal = [...rankings].sort((a, b) => b.total_tilt - a.total_tilt);
            const byFloor = [...rankings].sort((a, b) => b.tilt_ci_lower_90 - a.tilt_ci_lower_90);
            const byRaw = [...rankings].sort((a, b) => b.total_tilt_per_match - a.total_tilt_per_match);
            const rankOf = (arr, slug) => { const i = arr.findIndex(p => p.slug === slug); return i < 0 ? null : i + 1; };

            // ensemble.md — career-match counts + ABD total/floor rank
            const kumar = bySlug('b-kumar-2e81a32d');
            const abd = bySlug('ab-de-villiers-c4487b84');
            // The §13 intro spans and the §147-148 "What this fixes" row labels
            // both carry these identity match-counts; hydrate both so neither
            // drifts as a player keeps appearing (#208).
            if (kumar) {
                setText('ens-kumar-mt', kumar.total_matches);
                setText('ens-kumar-mt-row', kumar.total_matches);
            }
            if (abd) {
                setText('ens-abd-mt', abd.total_matches);
                setText('ens-abd-mt-row', abd.total_matches);
                setText('ens-abd-total-rank', rankOf(byTotal, abd.slug));
                setText('ens-abd-floor-rank', rankOf(byFloor, abd.slug));
            }

            // innings-boundary.md — the #111 ABD-vs-Bhuvneshwar rank inversion
            if (has('ib-abd-total-rank')) {
                setText('ib-abd-total-rank', rankOf(byTotal, 'ab-de-villiers-c4487b84'));
                setText('ib-abd-floor-rank', rankOf(byFloor, 'ab-de-villiers-c4487b84'));
                setText('ib-bkumar-total-rank', rankOf(byTotal, 'b-kumar-2e81a32d'));
            }

            // innings-boundary.md — the top-10 before/after table. Row set +
            // "After" track live total_tilt; "Before" is the frozen pre-fix
            // snapshot (commit 4830ea070^) kept as a per-slug constant. A live
            // top-10 entrant with no frozen Before shows "—".
            const ibTable = has('ib-top10-table');
            if (ibTable) {
                const BEFORE = {
                    'sp-narine-9d430b40': 11.27, 'jj-bumrah-462411b3': 8.85,
                    'ab-de-villiers-c4487b84': 6.71, 'ys-chahal-57ee1fde': 6.94,
                    'sl-malinga-a12e1d51': 6.52, 'rashid-khan-5f547c8b': 6.45,
                    'b-kumar-2e81a32d': 5.50, 'da-warner-dcce6f09': 4.42,
                    'jc-buttler-99b75528': 4.24, 'kl-rahul-b17e2f24': 3.66,
                    'ms-dhoni-4a8a2e3b': 3.32,
                };
                const signed = n => (n >= 0 ? '+' : '−') + Math.abs(n).toFixed(2);
                const rows = byTotal.slice(0, 10).map(p => {
                    const after = +p.total_tilt.toFixed(2);
                    const before = BEFORE[p.slug];
                    const d = before == null ? null : +(after - before).toFixed(2);
                    const aCell = d != null && d > 0 ? `<strong>${after.toFixed(2)}</strong>` : after.toFixed(2);
                    const dCell = d == null ? '—' : (d > 0 ? `<strong>${signed(d)}</strong>` : signed(d));
                    return `<tr><td>${p.player}</td><td>${before == null ? '—' : before.toFixed(2)}</td>`
                        + `<td>${aCell}</td><td>${dCell}</td></tr>`;
                }).join('');
                ibTable.innerHTML = `<table><thead><tr><th>Player</th><th>Before</th>`
                    + `<th>After</th><th>Δ</th></tr></thead><tbody>${rows}</tbody></table>`;
            }

            // all-rounders.md — floor-top-100 cohort count + named-player cells
            if (has('ar-floor-top100-count')) {
                const arInTop100 = byFloor.slice(0, 100).filter(p => p.role === 'all-rounder').length;
                const numWord = { 4: 'four', 5: 'five', 6: 'six', 7: 'seven', 8: 'eight' };
                setText('ar-floor-top100-count', numWord[arInTop100] || String(arInTop100));
                const arPlayers = [
                    ['pathan', 'yk-pathan-3c6ffae8'], ['maxwell', 'gj-maxwell-b681e71e'],
                    ['pollard', 'ka-pollard-a757b0d8'], ['watson', 'sr-watson-4329fbb5'],
                    ['russell', 'ad-russell-bbd41817'], ['stokes', 'ba-stokes-e087956b'],
                    ['pandya', 'hh-pandya-dbe50b21'], ['hopes', 'jr-hopes-2498e163'],
                ];
                for (const [key, slug] of arPlayers) {
                    const p = bySlug(slug);
                    if (!p) continue;
                    setText(`ar-${key}-floor`, rankOf(byFloor, slug));
                    setText(`ar-${key}-raw`, rankOf(byRaw, slug));
                    setText(`ar-${key}-tpm`, p.total_tilt_per_match.toFixed(4));
                }
                // Several named ranks are echoed in the surrounding prose; an
                // id hydrates only one element, so the prose copies get -prose
                // ids set here (keeps prose and the table from drifting apart).
                setText('ar-pathan-raw-prose', rankOf(byRaw, 'yk-pathan-3c6ffae8'));
                setText('ar-maxwell-raw-prose', rankOf(byRaw, 'gj-maxwell-b681e71e'));
                setText('ar-pandya-floor-prose', rankOf(byFloor, 'hh-pandya-dbe50b21'));
                setText('ar-hopes-raw-prose', rankOf(byRaw, 'jr-hopes-2498e163'));
                setText('ar-hopes-floor-prose', rankOf(byFloor, 'jr-hopes-2498e163'));
                setText('ar-stokes-raw-prose', rankOf(byRaw, 'ba-stokes-e087956b'));
                setText('ar-stokes-floor-prose', rankOf(byFloor, 'ba-stokes-e087956b'));
            }
        }

        if (needPlayers) {
            // kohli-2016-paradox.md — the comparison-table TILT/match column +
            // the line-148 prose echo, from each player's seasons[] JSON.
            const KP = [
                ['kohli-2016', 'v-kohli-ba607b88', '2016'], ['kohli-2019', 'v-kohli-ba607b88', '2019'],
                ['warner-2016', 'da-warner-dcce6f09', '2016'], ['rahul-2018', 'kl-rahul-b17e2f24', '2018'],
                ['faf-2021', 'f-du-plessis-3355b542', '2021'], ['rahane-2013', 'am-rahane-29e95537', '2013'],
                ['kallis-2012', 'jh-kallis-86dc8f2e', '2012'], ['ishan-2022', 'ishan-kishan-752f7486', '2022'],
            ];
            const slugs = [...new Set(KP.map(x => x[1]))];
            const files = {};
            (await Promise.all(slugs.map(s => fetch(`data/players/${s}.json`).then(r => r.ok ? r.json() : null))))
                .forEach((j, i) => { files[slugs[i]] = j; });
            const pct = v => (v >= 0 ? '+' : '') + (v * 100).toFixed(2) + '%';
            for (const [key, slug, season] of KP) {
                const j = files[slug];
                if (!j) continue;
                const s = (j.seasons || []).find(x => x.season === season);
                if (!s || s.batting_tilt_per_match == null) continue;
                setText(`kp-${key}-tpm`, pct(s.batting_tilt_per_match));
                if (key === 'rahul-2018') setText('kp-rahul-2018-tpm-prose', pct(s.batting_tilt_per_match));
            }
        }

        const snapEl = has('snap-top5-bowling');
        if (snapEl) {
            const top5 = (goats && goats.match_bowling ? [...goats.match_bowling] : [])
                .sort((a, b) => b.tilt - a.tilt).slice(0, 5);
            if (!top5.length) {
                snapEl.classList.add('loading');
                snapEl.textContent = 'top-5 unavailable — rankings not yet generated.';
            } else {
                const rows = top5.map((r, i) => {
                    const tilt = (r.tilt >= 0 ? '+' : '') + r.tilt.toFixed(2);
                    const overs = r.balls % 6 === 0 ? String(r.balls / 6) : ballsToOvers(r.balls);
                    const match = `<a href="match.html?id=${r.match_id}" class="match-link">${r.date}</a> · ${r.team}`;
                    return `<tr><td>${i + 1}</td><td>${r.player}</td><td>${match}</td>`
                        + `<td>${r.wickets}/${r.runs_conceded} (${overs} ov)</td><td>${tilt}</td></tr>`;
                }).join('');
                snapEl.classList.remove('loading');
                snapEl.innerHTML = `<table><thead><tr>`
                    + `<th>#</th><th>Bowler</th><th>Match</th><th>Figures</th><th>TILT</th>`
                    + `</tr></thead><tbody>${rows}</tbody></table>`;
            }
        }
    } catch (e) { /* keep the static fallbacks already in the markdown */ }
}

function showListing(push = true) {
    document.getElementById('listing').style.display = '';
    document.getElementById('article').style.display = 'none';
    document.title = 'The TILT | Notes';
    // Only push when the user explicitly navigated back to the listing.
    // popstate already moved the history pointer, so pushing there would
    // clobber the forward entry and trap the back button.
    if (push) history.pushState({}, '', 'notes.html');
}

document.getElementById('backLink').addEventListener('click', (e) => {
    e.preventDefault();
    showListing(true);
});

window.addEventListener('popstate', (e) => {
    if (e.state && e.state.note) {
        loadNote(e.state.note, false);
    } else {
        showListing(false);
    }
});

// Populate the listing unconditionally so "back to notes" works even when the
// page was entered directly via a ?note= deep-link (NOTES is a sync constant).
renderListing();

// Check URL params on load
const params = new URLSearchParams(window.location.search);
const noteParam = params.get('note');
if (noteParam) {
    loadNote(noteParam, false);
}
</script>
</body>
</html>
