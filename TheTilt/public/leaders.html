<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The TILT | Leaders</title>
    <meta name="description" content="IPL season leaderboards by TILT and traditional batting/bowling stats.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://thetilt-rust.vercel.app/leaders.html">
    <meta property="og:title" content="The TILT | Leaders">
    <meta property="og:description" content="IPL season leaderboards by TILT and traditional batting/bowling stats.">
    <meta property="og:image" content="https://thetilt-rust.vercel.app/assets/crest.png">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="The TILT | Leaders">
    <meta name="twitter:description" content="IPL season leaderboards by TILT and traditional batting/bowling stats.">
    <meta name="twitter:image" content="https://thetilt-rust.vercel.app/assets/crest.png">
    <link rel="icon" type="image/svg+xml" href="assets/crest-icon.svg">
    <link rel="alternate icon" type="image/png" href="assets/crest-icon.png">
    <link rel="stylesheet" href="style.css">
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');</script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <nav class="top-nav"></nav>
    <script src="common.js"></script>
    <script>initNav('leaders');</script>

    <div class="container">
        <div id="content">
            <div class="loading">loading leaders…</div>
        </div>
        <div class="footer">
            data from <a href="https://cricsheet.org">cricsheet.org</a> |
            <a href="index.html">back to TILT</a>
        </div>
    </div>

<script>
// Shared with season.html via common.js so chip labels/order can't drift (#138).
const STAT_LABELS = window.STAT_LABELS;
const STAT_ORDER = window.STAT_ORDER;

const STAT_THRESHOLDS = {
    sr: 'min 100 balls faced',
    economy: 'min 100 legal deliveries bowled',
    batting_tilt: 'min 100 balls faced',
    bowling_tilt: 'min 100 legal deliveries bowled',
    total_tilt: 'min 100 balls (batting or bowling)',
};

function isTiltStat(stat) {
    return stat.endsWith('_tilt');
}

function ancillaryColumns(stat, row) {
    if (stat === 'runs') return `<td>${row.balls}</td><td>${row.sr.toFixed(2)}</td><td>${row.innings}</td>`;
    if (stat === 'wickets') return `<td>${ballsToOvers(row.balls)} ov</td><td>${row.economy.toFixed(2)}</td><td>${row.innings}</td>`;
    if (stat === 'sr') return `<td>${row.runs}</td><td>${row.balls}</td>`;
    if (stat === 'economy') return `<td>${row.wickets}</td><td>${ballsToOvers(row.balls)} ov</td>`;
    if (stat === 'batting_tilt' || stat === 'bowling_tilt') return `<td>${formatTilt(row.per_match)}</td><td>${row.matches}</td><td>${row.balls}</td>`;
    if (stat === 'total_tilt') return `<td>${formatTilt(row.per_match)}</td><td>${row.matches}</td>`;
    if (stat === 'fifties') return `<td>${row.hundreds}</td><td>${row.innings}</td>`;
    if (stat === 'hundreds') return `<td>${row.fifties}</td><td>${row.innings}</td>`;
    if (stat === 'fours' || stat === 'sixes') return `<td>${row.runs}</td><td>${row.balls}</td>`;
    return '';
}

function ancillaryHeaders(stat) {
    if (stat === 'runs') return '<th>Balls</th><th>SR</th><th>Inn</th>';
    if (stat === 'wickets') return '<th>Overs</th><th>Econ</th><th>Inn</th>';
    if (stat === 'sr') return '<th>Runs</th><th>Balls</th>';
    if (stat === 'economy') return '<th>Wkts</th><th>Overs</th>';
    if (stat === 'batting_tilt' || stat === 'bowling_tilt') return '<th>Per Match</th><th>Matches</th><th>Balls</th>';
    if (stat === 'total_tilt') return '<th>Per Match</th><th>Matches</th>';
    if (stat === 'fifties') return '<th>100s</th><th>Inn</th>';
    if (stat === 'hundreds') return '<th>50s</th><th>Inn</th>';
    if (stat === 'fours' || stat === 'sixes') return '<th>Runs</th><th>Balls</th>';
    return '';
}

function formatLeaderValue(stat, value) {
    if (isTiltStat(stat)) return formatTilt(value);
    if (stat === 'sr' || stat === 'economy') return Number(value).toFixed(2);
    return String(value);
}

async function loadLeaders() {
    const params = new URLSearchParams(window.location.search);
    let season = params.get('season');
    let stat = params.get('stat');
    const teamIndex = await loadTeamIndex();

    let allSeasons = [];
    try {
        const m = await (await fetch('data/meta.json')).json();
        allSeasons = (m.seasons || []).slice().reverse();
    } catch (e) {}

    if (!season) season = allSeasons[0];
    if (!stat) stat = 'runs';

    if (!season) {
        document.getElementById('content').innerHTML = '<div class="loading">no season available</div>';
        return;
    }

    let data;
    try {
        const seasonSlug = season.replace('/', '-');
        const res = await fetch(`data/leaders/${seasonSlug}-${stat}.json`);
        if (!res.ok) throw new Error('not found');
        data = await res.json();
        document.title = `The TILT | ${STAT_LABELS[stat]} Leaders – IPL ${data.season}`;
    } catch (e) {
        document.getElementById('content').innerHTML = `<div class="loading">no leaders for ${stat} in ${season}</div>`;
        return;
    }

    const seasonChips = allSeasons.map((s) => {
        const cls = s === data.season ? 'picker-chip active' : 'picker-chip';
        return `<a href="leaders.html?season=${encodeURIComponent(s)}&stat=${stat}" class="${cls}">${s}</a>`;
    }).join('');

    const statChips = STAT_ORDER.map((s) => {
        const cls = s === stat ? 'picker-chip active' : 'picker-chip';
        return `<a href="leaders.html?season=${encodeURIComponent(data.season)}&stat=${s}" class="${cls}">${STAT_LABELS[s]}</a>`;
    }).join('');

    const directionNote = stat === 'economy' ? '(lower is better)' : '';
    const threshold = STAT_THRESHOLDS[stat];

    const html = `
        <div class="page-header">
            <h1>${STAT_LABELS[stat]} Leaders | IPL ${data.season}</h1>
            <div class="subtitle">${directionNote}${threshold ? ` ${threshold}` : ''}</div>
        </div>

        <div class="picker-row">
            <div class="picker-row-label">Season</div>
            <div class="picker-chips">${seasonChips}</div>
        </div>
        <div class="picker-row">
            <div class="picker-row-label">Stat</div>
            <div class="picker-chips">${statChips}</div>
        </div>

        <div class="table-wrap">
            <table class="detail-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Player</th>
                        <th>Team</th>
                        <th>${STAT_LABELS[stat]}</th>
                        ${ancillaryHeaders(stat)}
                    </tr>
                </thead>
                <tbody>
                    ${data.leaders.map((r) => `
                        <tr>
                            <td>${r.rank}</td>
                            <td><a href="player.html?player=${r.slug}">${flagSpan(r.country)}${r.player}</a></td>
                            <td>${teamLink(r.team, data.season, teamIndex, { cls: 'team-link-subtle' })}</td>
                            <td><strong>${formatLeaderValue(stat, r.value)}</strong></td>
                            ${ancillaryColumns(stat, r)}
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>
    `;

    document.getElementById('content').innerHTML = html;
}

loadLeaders();
</script>
</body>
</html>
