<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The TILT — Player</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        .player-header { margin-bottom: 24px; }
        .player-header h2 { color: #4ade80; font-size: 1.3rem; }
        .player-header .team { color: #888; font-size: 0.9rem; }

        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 28px; }
        .stat-card { background: #222; padding: 12px; border: 1px solid #333; }
        .stat-card .label { color: #888; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 4px; }
        .stat-card .value { font-size: 1.2rem; font-weight: bold; }

        .section { margin-bottom: 28px; }
        .section h3 { color: #888; font-size: 0.9rem; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 4px; }

        .detail-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .detail-table th { text-align: left; padding: 6px; color: #888; border-bottom: 1px solid #333; }
        .detail-table td { padding: 6px; border-bottom: 1px solid #222; }

        .bar-container { width: 80px; height: 10px; background: #222; display: inline-block; vertical-align: middle; }
        .bar-fill { height: 100%; }
        .bar-fill.positive { background: #4ade80; }
        .bar-fill.negative { background: #f87171; }
    </style>
</head>
<body>
    <h1>THE TILT</h1>
    <div class="subtitle">win probability added for IPL cricket</div>

    <div class="nav">
        <a href="index.html">leaderboard</a>
        <a href="about.html">about</a>
    </div>

    <div id="content">
        <div class="loading">loading player...</div>
    </div>

    <div class="footer">
        data from <a href="https://cricsheet.org">cricsheet.org</a> |
        <a href="index.html">back to leaderboard</a>
    </div>

<script>
function formatTilt(val) {
    const sign = val >= 0 ? '+' : '';
    const pct = (val * 100).toFixed(2);
    const cls = val > 0.001 ? 'tilt-positive' : val < -0.001 ? 'tilt-negative' : 'tilt-neutral';
    return `<span class="${cls}">${sign}${pct}%</span>`;
}

async function loadPlayer() {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('player');

    if (!slug) {
        document.getElementById('content').innerHTML = '<div class="loading">no player specified</div>';
        return;
    }

    try {
        const res = await fetch(`data/players/${slug}.json`);
        if (!res.ok) throw new Error('not found');
        const p = await res.json();

        document.title = `The TILT — ${p.player}`;

        let html = `
            <div class="player-header">
                <h2>${p.player}</h2>
                <div class="team">${p.team} | ${p.total_matches} matches | ${p.batting_balls} balls faced | ${p.bowling_balls} balls bowled</div>
            </div>

            <div class="stat-grid">
                <div class="stat-card">
                    <div class="label">total TILT/match</div>
                    <div class="value">${formatTilt(p.shrunk_total_tilt_per_match || p.total_tilt_per_match)}</div>
                    ${p.shrunk_total_tilt_per_match != null ? `<div style="color:#888;font-size:0.6rem;margin-top:2px">raw: ${formatTilt(p.total_tilt_per_match)} | ${p.confidence || 'low'} conf</div>` : ''}
                </div>
                <div class="stat-card">
                    <div class="label">batting TILT/match</div>
                    <div class="value">${formatTilt(p.shrunk_batting_tilt_per_match || p.batting_tilt_per_match)}</div>
                </div>
                <div class="stat-card">
                    <div class="label">bowling TILT/match</div>
                    <div class="value">${formatTilt(p.shrunk_bowling_tilt_per_match || p.bowling_tilt_per_match)}</div>
                </div>
            </div>
        `;

        // Season breakdown (batting + bowling)
        if (p.seasons && p.seasons.length > 0) {
            const maxSeasonTilt = Math.max(
                ...p.seasons.map(s => Math.abs(s.batting_tilt_per_match)),
                ...p.seasons.map(s => Math.abs(s.bowling_tilt_per_match)),
                0.01
            );
            html += `<div class="section"><h3>by season</h3><table class="detail-table">
                <tr><th>season</th><th>bat TILT/m</th><th>bowl TILT/m</th><th></th><th>bat m</th><th>bowl m</th></tr>`;
            p.seasons.sort((a, b) => a.season.localeCompare(b.season));
            for (const s of p.seasons) {
                const batTilt = s.batting_tilt_per_match || 0;
                const bowlTilt = s.bowling_tilt_per_match || 0;
                const totalTilt = batTilt + bowlTilt;
                const barW = Math.abs(totalTilt) / maxSeasonTilt * 80;
                const barCls = totalTilt >= 0 ? 'positive' : 'negative';
                html += `<tr>
                    <td>${s.season}</td>
                    <td>${formatTilt(batTilt)}</td>
                    <td>${formatTilt(bowlTilt)}</td>
                    <td><div class="bar-container"><div class="bar-fill ${barCls}" style="width:${Math.min(barW, 80)}px"></div></div></td>
                    <td>${s.batting_matches || 0}</td>
                    <td>${s.bowling_matches || 0}</td>
                </tr>`;
            }
            html += '</table></div>';
        }

        // Phase breakdown (batting)
        if (p.batting_phases && p.batting_phases.length > 0) {
            html += `<div class="section"><h3>by phase (batting)</h3><table class="detail-table">
                <tr><th>phase</th><th>avg TILT/ball</th><th>total TILT</th><th>balls</th></tr>`;
            for (const ph of p.batting_phases) {
                html += `<tr>
                    <td>${ph.phase}</td>
                    <td>${formatTilt(ph.avg_delta)}</td>
                    <td>${formatTilt(ph.tilt)}</td>
                    <td>${ph.balls}</td>
                </tr>`;
            }
            html += '</table></div>';
        }

        // Phase breakdown (bowling)
        if (p.bowling_phases && p.bowling_phases.length > 0) {
            html += `<div class="section"><h3>by phase (bowling)</h3><table class="detail-table">
                <tr><th>phase</th><th>avg TILT/ball</th><th>total TILT</th><th>balls</th></tr>`;
            for (const ph of p.bowling_phases) {
                html += `<tr>
                    <td>${ph.phase}</td>
                    <td>${formatTilt(ph.avg_delta)}</td>
                    <td>${formatTilt(ph.tilt)}</td>
                    <td>${ph.balls}</td>
                </tr>`;
            }
            html += '</table></div>';
        }

        // Best batting performances
        if (p.best_matches && p.best_matches.length > 0) {
            html += `<div class="section"><h3>best batting performances</h3><table class="detail-table">
                <tr><th>date</th><th>vs</th><th>TILT</th><th>runs</th><th>balls</th></tr>`;
            for (const m of p.best_matches) {
                html += `<tr>
                    <td>${m.date}</td><td>${m.vs}</td>
                    <td>${formatTilt(m.tilt)}</td><td>${m.runs}</td><td>${m.balls}</td>
                </tr>`;
            }
            html += '</table></div>';
        }

        // Worst batting performances
        if (p.worst_matches && p.worst_matches.length > 0) {
            html += `<div class="section"><h3>worst batting performances</h3><table class="detail-table">
                <tr><th>date</th><th>vs</th><th>TILT</th><th>runs</th><th>balls</th></tr>`;
            for (const m of p.worst_matches) {
                html += `<tr>
                    <td>${m.date}</td><td>${m.vs}</td>
                    <td>${formatTilt(m.tilt)}</td><td>${m.runs}</td><td>${m.balls}</td>
                </tr>`;
            }
            html += '</table></div>';
        }

        // Best bowling performances
        if (p.bowling_best_matches && p.bowling_best_matches.length > 0) {
            html += `<div class="section"><h3>best bowling performances</h3><table class="detail-table">
                <tr><th>date</th><th>vs</th><th>TILT</th><th>wickets</th><th>balls</th></tr>`;
            for (const m of p.bowling_best_matches) {
                html += `<tr>
                    <td>${m.date}</td><td>${m.vs}</td>
                    <td>${formatTilt(m.tilt)}</td><td>${m.wickets}</td><td>${m.balls}</td>
                </tr>`;
            }
            html += '</table></div>';
        }

        // Worst bowling performances
        if (p.bowling_worst_matches && p.bowling_worst_matches.length > 0) {
            html += `<div class="section"><h3>worst bowling performances</h3><table class="detail-table">
                <tr><th>date</th><th>vs</th><th>TILT</th><th>wickets</th><th>balls</th></tr>`;
            for (const m of p.bowling_worst_matches) {
                html += `<tr>
                    <td>${m.date}</td><td>${m.vs}</td>
                    <td>${formatTilt(m.tilt)}</td><td>${m.wickets}</td><td>${m.balls}</td>
                </tr>`;
            }
            html += '</table></div>';
        }

        // Career trend chart
        if (p.career_trend && p.career_trend.length > 1) {
            html += `<div class="section"><h3>career TILT trend</h3>
                <div style="height:220px;background:#1a1a1a;padding:8px;border:1px solid #333">
                    <canvas id="careerChart"></canvas>
                </div></div>`;
        }

        // Team matchups chart
        if (p.team_matchups && p.team_matchups.length > 0) {
            html += `<div class="section"><h3>batting TILT by opponent</h3>
                <div style="height:${Math.max(150, p.team_matchups.length * 28)}px;background:#1a1a1a;padding:8px;border:1px solid #333">
                    <canvas id="matchupChart"></canvas>
                </div></div>`;
        }

        document.getElementById('content').innerHTML = html;

        // Render charts after DOM is ready
        if (p.career_trend && p.career_trend.length > 1) {
            const ctx = document.getElementById('careerChart');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: p.career_trend.map(t => t.match),
                    datasets: [{
                        label: 'Cumulative TILT',
                        data: p.career_trend.map(t => +(t.cumulative * 100).toFixed(2)),
                        borderColor: '#4ade80',
                        backgroundColor: 'rgba(74,222,128,0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: p.career_trend.length > 50 ? 0 : 2,
                        pointHoverRadius: 4,
                        borderWidth: 1.5,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                title: (items) => {
                                    const i = items[0].dataIndex;
                                    const t = p.career_trend[i];
                                    return `Match ${t.match} (${t.date})`;
                                },
                                label: (item) => {
                                    const i = item.dataIndex;
                                    const t = p.career_trend[i];
                                    return `Cumulative: ${item.formattedValue}% | This match: ${(t.tilt*100).toFixed(2)}%`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: { title: { display: true, text: 'Match #', color: '#888' }, ticks: { color: '#666' }, grid: { color: '#333' } },
                        y: { title: { display: true, text: 'Cumulative TILT %', color: '#888' }, ticks: { color: '#666' }, grid: { color: '#333' } }
                    }
                }
            });
        }

        if (p.team_matchups && p.team_matchups.length > 0) {
            const ctx2 = document.getElementById('matchupChart');
            const matchups = p.team_matchups;
            new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: matchups.map(m => m.opponent),
                    datasets: [{
                        label: 'TILT/match',
                        data: matchups.map(m => +(m.tilt_per_match * 100).toFixed(2)),
                        backgroundColor: matchups.map(m => m.tilt_per_match >= 0 ? 'rgba(74,222,128,0.7)' : 'rgba(248,113,113,0.7)'),
                        borderColor: matchups.map(m => m.tilt_per_match >= 0 ? '#4ade80' : '#f87171'),
                        borderWidth: 1,
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (item) => {
                                    const m = matchups[item.dataIndex];
                                    return `${item.formattedValue}% (${m.matches} matches)`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: { title: { display: true, text: 'TILT/match %', color: '#888' }, ticks: { color: '#666' }, grid: { color: '#333' } },
                        y: { ticks: { color: '#aaa', font: { size: 10 } }, grid: { display: false } }
                    }
                }
            });
        }

    } catch (e) {
        document.getElementById('content').innerHTML = '<div class="loading">player not found</div>';
    }
}

loadPlayer();
</script>
</body>
</html>
