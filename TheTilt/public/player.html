<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The TILT — Player</title>
    <link rel="stylesheet" href="style.css">
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');</script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
    <nav class="top-nav">
        <div class="top-nav-inner">
            <div class="logo"><a href="index.html">THE TILT</a></div>
            <div class="nav-links">
                <a href="index.html">leaderboard</a>
                <a href="goats.html">🐐 GOATs</a>
                <a href="about.html">about</a>
                <div class="theme-switch">
                    <span class="theme-icon" id="sunIcon">&#9788;</span>
                    <button class="theme-toggle" id="themeBtn"></button>
                    <span class="theme-icon" id="moonIcon">&#9789;</span>
                </div>
            </div>
        </div>
    </nav>
    <script>
        (function() {
            const t = document.documentElement.getAttribute('data-theme') || 'dark';
            document.getElementById(t === 'dark' ? 'moonIcon' : 'sunIcon').classList.add('active');
            document.getElementById('themeBtn').addEventListener('click', () => {
                const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                document.getElementById('sunIcon').classList.toggle('active');
                document.getElementById('moonIcon').classList.toggle('active');
            });
        })();
    </script>

    <div class="container">
        <div id="content">
            <div class="loading">loading player...</div>
        </div>

        <div class="footer">
            data from <a href="https://cricsheet.org">cricsheet.org</a> |
            <a href="index.html">back to leaderboard</a>
        </div>
    </div>

<script>
function cssVar(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

function formatTilt(val) {
    const sign = val >= 0 ? '+' : '';
    const pct = (val * 100).toFixed(2);
    const cls = val > 0.001 ? 'tilt-positive' : val < -0.001 ? 'tilt-negative' : 'tilt-neutral';
    return `<span class="${cls}">${sign}${pct}%</span>`;
}

async function loadPlayer() {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('player');

    if (!slug) {
        document.getElementById('content').innerHTML = '<div class="loading">no player specified</div>';
        return;
    }

    try {
        const res = await fetch(`data/players/${slug}.json`);
        if (!res.ok) throw new Error('not found');
        const p = await res.json();

        const displayName = p.full_name && p.full_name !== p.player ? p.full_name : p.player;
        document.title = `The TILT — ${displayName}`;

        let html = `
            <div class="player-header">
                <h2>${displayName}</h2>
                ${p.full_name && p.full_name !== p.player ? `<div class="initials">${p.player}</div>` : ''}
                <div class="team">${(p.teams && p.teams.length > 0 ? p.teams.join(', ') : p.team)} | ${p.total_matches} matches | ${p.batting_balls} balls faced | ${p.bowling_balls} balls bowled</div>
            </div>

            <div class="stat-grid">
                <div class="stat-card">
                    <div class="label">total TILT/match</div>
                    <div class="value">${formatTilt(p.shrunk_total_tilt_per_match || p.total_tilt_per_match)}</div>
                    <div style="color:var(--text-dim);font-size:0.7rem;margin-top:4px">shifts win probability by ${Math.abs((p.shrunk_total_tilt_per_match || p.total_tilt_per_match) * 100).toFixed(1)} percentage points per match</div>
                    ${p.tilt_ci_lower_90 != null && p.tilt_ci_upper_90 != null ? `<div style="color:var(--text-dim);font-size:0.7rem;margin-top:4px">90% CI: ${formatTilt(p.tilt_ci_lower_90)} to ${formatTilt(p.tilt_ci_upper_90)}</div>` : ''}
                    ${p.shrunk_total_tilt_per_match != null ? `<div style="color:var(--text-dim);font-size:0.65rem;margin-top:2px">raw: ${formatTilt(p.total_tilt_per_match)} | ${p.confidence || 'low'} confidence</div>` : ''}
                </div>
                <div class="stat-card">
                    <div class="label">batting TILT/match</div>
                    <div class="value">${p.shrunk_batting_tilt_per_match != null ? formatTilt(p.shrunk_batting_tilt_per_match) : p.batting_tilt_per_match != null ? formatTilt(p.batting_tilt_per_match) : '<span class="tilt-neutral">n/a</span>'}</div>
                    ${p.batting_tilt_per_match == null ? `<div style="color:var(--text-dim);font-size:0.65rem;margin-top:2px">${p.batting_balls} balls (min 50)</div>` : ''}
                </div>
                <div class="stat-card">
                    <div class="label">bowling TILT/match</div>
                    <div class="value">${p.shrunk_bowling_tilt_per_match != null ? formatTilt(p.shrunk_bowling_tilt_per_match) : p.bowling_tilt_per_match != null ? formatTilt(p.bowling_tilt_per_match) : '<span class="tilt-neutral">n/a</span>'}</div>
                    ${p.bowling_tilt_per_match == null ? `<div style="color:var(--text-dim);font-size:0.65rem;margin-top:2px">${p.bowling_balls} balls (min 50)</div>` : ''}
                </div>
            </div>
        `;

        // Batting statistics by season
        const seasonsWithBat = (p.seasons || []).filter(s => s.batting_stats);
        if (p.batting_stats || seasonsWithBat.length > 0) {
            html += '<div class="section"><h3>batting statistics</h3>';
            html += `<table class="detail-table">
                <tr><th>season</th><th>team</th><th>inn</th><th>runs</th><th>avg</th><th>SR</th><th>HS</th><th>50s</th><th>100s</th></tr>`;
            for (const s of seasonsWithBat) {
                const b = s.batting_stats;
                html += `<tr>
                    <td>${s.season}</td>
                    <td><span class="season-team">${s.team || ''}</span></td>
                    <td>${b.innings}</td><td>${b.runs}</td><td>${b.avg}</td><td>${b.sr}</td><td>${b.hs}</td><td>${b.fifties}</td><td>${b.hundreds}</td>
                </tr>`;
            }
            if (p.batting_stats) {
                const b = p.batting_stats;
                html += `<tr class="career-total">
                    <td colspan="2">career</td>
                    <td>${b.innings}</td><td>${b.runs}</td><td>${b.avg}</td><td>${b.sr}</td><td>${b.hs}</td><td>${b.fifties}</td><td>${b.hundreds}</td>
                </tr>`;
            }
            html += '</table></div>';
        }

        // Bowling statistics by season
        const seasonsWithBowl = (p.seasons || []).filter(s => s.bowling_stats);
        if (p.bowling_stats || seasonsWithBowl.length > 0) {
            html += '<div class="section"><h3>bowling statistics</h3>';
            html += `<table class="detail-table">
                <tr><th>season</th><th>team</th><th>inn</th><th>wkts</th><th>avg</th><th>econ</th><th>best</th></tr>`;
            for (const s of seasonsWithBowl) {
                const b = s.bowling_stats;
                html += `<tr>
                    <td>${s.season}</td>
                    <td><span class="season-team">${s.team || ''}</span></td>
                    <td>${b.innings}</td><td>${b.wickets}</td><td>${b.avg}</td><td>${b.economy}</td><td>${b.best_figures}</td>
                </tr>`;
            }
            if (p.bowling_stats) {
                const b = p.bowling_stats;
                html += `<tr class="career-total">
                    <td colspan="2">career</td>
                    <td>${b.innings}</td><td>${b.wickets}</td><td>${b.avg}</td><td>${b.economy}</td><td>${b.best_figures}</td>
                </tr>`;
            }
            html += '</table></div>';
        }

        // Match TILT distribution histogram
        if (p.match_tilt_distribution && p.match_tilt_distribution.length > 3) {
            html += `<div class="section"><h3>match TILT distribution</h3>
                <div class="chart-container" style="height:220px">
                    <canvas id="distChart"></canvas>
                </div>
                <div style="color:var(--text-dim);font-size:0.65rem;margin-top:6px">each bar represents matches where this player's total TILT fell in that range</div>
            </div>`;
        }

        // Season breakdown
        if (p.seasons && p.seasons.length > 0) {
            const maxSeasonTilt = Math.max(
                ...p.seasons.map(s => Math.abs(s.batting_tilt_per_match)),
                ...p.seasons.map(s => Math.abs(s.bowling_tilt_per_match)),
                0.01
            );
            html += `<div class="section"><h3>by season</h3><table class="detail-table">
                <tr><th>season</th><th>bat TILT/m</th><th>bowl TILT/m</th><th></th><th>bat m</th><th>bowl m</th></tr>`;
            p.seasons.sort((a, b) => a.season.localeCompare(b.season));
            for (const s of p.seasons) {
                const batTilt = s.batting_tilt_per_match || 0;
                const bowlTilt = s.bowling_tilt_per_match || 0;
                const totalTilt = batTilt + bowlTilt;
                const barW = Math.abs(totalTilt) / maxSeasonTilt * 80;
                const barCls = totalTilt >= 0 ? 'positive' : 'negative';
                html += `<tr>
                    <td>${s.season}</td>
                    <td>${formatTilt(batTilt)}</td>
                    <td>${formatTilt(bowlTilt)}</td>
                    <td><div class="bar-container"><div class="bar-fill ${barCls}" style="width:${Math.min(barW, 80)}px"></div></div></td>
                    <td>${s.batting_matches || 0}</td>
                    <td>${s.bowling_matches || 0}</td>
                </tr>`;
            }
            html += '</table></div>';
        }

        // Phase breakdown (batting)
        if (p.batting_phases && p.batting_phases.length > 0) {
            html += `<div class="section"><h3>by phase (batting)</h3><table class="detail-table">
                <tr><th>phase</th><th>avg TILT/ball</th><th>total TILT</th><th>balls</th></tr>`;
            for (const ph of p.batting_phases) {
                html += `<tr>
                    <td>${ph.phase}</td>
                    <td>${formatTilt(ph.avg_delta)}</td>
                    <td>${formatTilt(ph.tilt)}</td>
                    <td>${ph.balls}</td>
                </tr>`;
            }
            html += '</table></div>';
        }

        // Phase breakdown (bowling)
        if (p.bowling_phases && p.bowling_phases.length > 0) {
            html += `<div class="section"><h3>by phase (bowling)</h3><table class="detail-table">
                <tr><th>phase</th><th>avg TILT/ball</th><th>total TILT</th><th>balls</th></tr>`;
            for (const ph of p.bowling_phases) {
                html += `<tr>
                    <td>${ph.phase}</td>
                    <td>${formatTilt(ph.avg_delta)}</td>
                    <td>${formatTilt(ph.tilt)}</td>
                    <td>${ph.balls}</td>
                </tr>`;
            }
            html += '</table></div>';
        }

        // Best/worst batting performances (with match links)
        if (p.best_matches && p.best_matches.length > 0) {
            html += `<div class="section"><h3>best batting performances</h3><table class="detail-table">
                <tr><th>date</th><th>vs</th><th>TILT</th><th>runs</th><th>balls</th></tr>`;
            for (const m of p.best_matches) {
                const matchLink = m.match_id ? `match.html?id=${m.match_id}` : '#';
                html += `<tr onclick="window.location='${matchLink}'" style="cursor:pointer">
                    <td><a href="${matchLink}" style="color:inherit;text-decoration:none">${m.date}</a></td><td>${m.vs}</td>
                    <td>${formatTilt(m.tilt)}</td><td>${m.runs}</td><td>${m.balls}</td>
                </tr>`;
            }
            html += '</table></div>';
        }

        if (p.worst_matches && p.worst_matches.length > 0) {
            html += `<div class="section"><h3>worst batting performances</h3><table class="detail-table">
                <tr><th>date</th><th>vs</th><th>TILT</th><th>runs</th><th>balls</th></tr>`;
            for (const m of p.worst_matches) {
                const matchLink = m.match_id ? `match.html?id=${m.match_id}` : '#';
                html += `<tr onclick="window.location='${matchLink}'" style="cursor:pointer">
                    <td><a href="${matchLink}" style="color:inherit;text-decoration:none">${m.date}</a></td><td>${m.vs}</td>
                    <td>${formatTilt(m.tilt)}</td><td>${m.runs}</td><td>${m.balls}</td>
                </tr>`;
            }
            html += '</table></div>';
        }

        // Best/worst bowling performances (with match links)
        if (p.bowling_best_matches && p.bowling_best_matches.length > 0) {
            html += `<div class="section"><h3>best bowling performances</h3><table class="detail-table">
                <tr><th>date</th><th>vs</th><th>TILT</th><th>wickets</th><th>balls</th></tr>`;
            for (const m of p.bowling_best_matches) {
                const matchLink = m.match_id ? `match.html?id=${m.match_id}` : '#';
                html += `<tr onclick="window.location='${matchLink}'" style="cursor:pointer">
                    <td><a href="${matchLink}" style="color:inherit;text-decoration:none">${m.date}</a></td><td>${m.vs}</td>
                    <td>${formatTilt(m.tilt)}</td><td>${m.wickets}</td><td>${m.balls}</td>
                </tr>`;
            }
            html += '</table></div>';
        }

        if (p.bowling_worst_matches && p.bowling_worst_matches.length > 0) {
            html += `<div class="section"><h3>worst bowling performances</h3><table class="detail-table">
                <tr><th>date</th><th>vs</th><th>TILT</th><th>wickets</th><th>balls</th></tr>`;
            for (const m of p.bowling_worst_matches) {
                const matchLink = m.match_id ? `match.html?id=${m.match_id}` : '#';
                html += `<tr onclick="window.location='${matchLink}'" style="cursor:pointer">
                    <td><a href="${matchLink}" style="color:inherit;text-decoration:none">${m.date}</a></td><td>${m.vs}</td>
                    <td>${formatTilt(m.tilt)}</td><td>${m.wickets}</td><td>${m.balls}</td>
                </tr>`;
            }
            html += '</table></div>';
        }

        // Career trend chart
        if (p.career_trend && p.career_trend.length > 1) {
            html += `<div class="section"><h3>career TILT trend</h3>
                <div class="chart-container" style="height:220px">
                    <canvas id="careerChart"></canvas>
                </div></div>`;
        }

        // Team matchups chart
        if (p.team_matchups && p.team_matchups.length > 0) {
            html += `<div class="section"><h3>batting TILT by opponent</h3>
                <div class="chart-container" style="height:${Math.max(150, p.team_matchups.length * 28)}px">
                    <canvas id="matchupChart"></canvas>
                </div></div>`;
        }

        document.getElementById('content').innerHTML = html;

        // Render distribution histogram
        if (p.match_tilt_distribution && p.match_tilt_distribution.length > 3) {
            const data = p.match_tilt_distribution.map(v => v * 100);
            const min = Math.min(...data);
            const max = Math.max(...data);
            const binCount = Math.min(20, Math.max(8, Math.ceil(Math.sqrt(data.length))));
            const binWidth = (max - min) / binCount;
            const bins = Array(binCount).fill(0);
            const binLabels = [];
            for (let i = 0; i < binCount; i++) {
                const lo = min + i * binWidth;
                binLabels.push(lo.toFixed(1));
                data.forEach(v => {
                    if (v >= lo && (i === binCount - 1 ? v <= lo + binWidth : v < lo + binWidth)) bins[i]++;
                });
            }
            const mean = data.reduce((a, b) => a + b, 0) / data.length;

            new Chart(document.getElementById('distChart'), {
                type: 'bar',
                data: {
                    labels: binLabels,
                    datasets: [{
                        data: bins,
                        backgroundColor: bins.map((_, i) => {
                            const lo = min + i * binWidth;
                            return lo >= 0 ? cssVar('--accent-green') + '80' : cssVar('--accent-red') + '80';
                        }),
                        borderColor: bins.map((_, i) => {
                            const lo = min + i * binWidth;
                            return lo >= 0 ? cssVar('--accent-green') : cssVar('--accent-red');
                        }),
                        borderWidth: 1,
                        borderRadius: 2,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                title: (items) => {
                                    const i = items[0].dataIndex;
                                    const lo = (min + i * binWidth).toFixed(1);
                                    const hi = (min + (i + 1) * binWidth).toFixed(1);
                                    return `${lo}% to ${hi}%`;
                                },
                                label: (item) => `${item.raw} matches`
                            }
                        },
                        annotation: {
                            annotations: {
                                zeroLine: { type: 'line', xMin: (-min / binWidth), xMax: (-min / binWidth), borderColor: '#666', borderWidth: 1, borderDash: [3, 3] },
                            }
                        }
                    },
                    scales: {
                        x: {
                            title: { display: true, text: 'Match TILT %', color: cssVar('--text-muted'), font: { size: 11 } },
                            ticks: { color: cssVar('--text-muted'), font: { size: 10 }, maxRotation: 0 },
                            grid: { color: cssVar('--border') }
                        },
                        y: {
                            title: { display: true, text: 'Matches', color: cssVar('--text-muted'), font: { size: 11 } },
                            ticks: { color: cssVar('--text-muted'), font: { size: 10 } },
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        // Render career trend chart
        if (p.career_trend && p.career_trend.length > 1) {
            new Chart(document.getElementById('careerChart'), {
                type: 'line',
                data: {
                    labels: p.career_trend.map(t => t.match),
                    datasets: [{
                        label: 'Cumulative TILT',
                        data: p.career_trend.map(t => +(t.cumulative * 100).toFixed(2)),
                        borderColor: cssVar('--accent-green'),
                        backgroundColor: cssVar('--accent-green-dim'),
                        fill: true,
                        tension: 0.3,
                        pointRadius: p.career_trend.length > 50 ? 0 : 2,
                        pointHoverRadius: 4,
                        borderWidth: 1.5,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                title: (items) => {
                                    const i = items[0].dataIndex;
                                    const t = p.career_trend[i];
                                    return `Match ${t.match} (${t.date})`;
                                },
                                label: (item) => {
                                    const i = item.dataIndex;
                                    const t = p.career_trend[i];
                                    return `Cumulative: ${item.formattedValue}% | This match: ${(t.tilt*100).toFixed(2)}%`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: { title: { display: true, text: 'Match #', color: cssVar('--text-muted'), font: { size: 11 } }, ticks: { color: cssVar('--text-muted') }, grid: { color: cssVar('--border') } },
                        y: { title: { display: true, text: 'Cumulative TILT %', color: cssVar('--text-muted'), font: { size: 11 } }, ticks: { color: cssVar('--text-muted') }, grid: { color: cssVar('--border') } }
                    }
                }
            });
        }

        // Render matchup chart
        if (p.team_matchups && p.team_matchups.length > 0) {
            const matchups = p.team_matchups;
            new Chart(document.getElementById('matchupChart'), {
                type: 'bar',
                data: {
                    labels: matchups.map(m => m.opponent),
                    datasets: [{
                        label: 'TILT/match',
                        data: matchups.map(m => +(m.tilt_per_match * 100).toFixed(2)),
                        backgroundColor: matchups.map(m => m.tilt_per_match >= 0 ? cssVar('--accent-green') + '80' : cssVar('--accent-red') + '80'),
                        borderColor: matchups.map(m => m.tilt_per_match >= 0 ? cssVar('--accent-green') : cssVar('--accent-red')),
                        borderWidth: 1,
                        borderRadius: 2,
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (item) => {
                                    const m = matchups[item.dataIndex];
                                    return `${item.formattedValue}% (${m.matches} matches)`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: { title: { display: true, text: 'TILT/match %', color: cssVar('--text-muted'), font: { size: 11 } }, ticks: { color: cssVar('--text-muted') }, grid: { color: cssVar('--border') } },
                        y: { ticks: { color: cssVar('--text-secondary'), font: { size: 11 } }, grid: { display: false } }
                    }
                }
            });
        }

    } catch (e) {
        document.getElementById('content').innerHTML = '<div class="loading">player not found</div>';
    }
}

loadPlayer();
</script>
</body>
</html>
