<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The TILT | Player</title>
    <meta name="description" content="Career and per-season TILT — win-probability added — for an IPL player.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://thetilt-rust.vercel.app/player.html">
    <meta property="og:title" content="The TILT | Player">
    <meta property="og:description" content="Career and per-season TILT — win-probability added — for an IPL player.">
    <meta property="og:image" content="https://thetilt-rust.vercel.app/assets/crest.png">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="The TILT | Player">
    <meta name="twitter:description" content="Career and per-season TILT — win-probability added — for an IPL player.">
    <meta name="twitter:image" content="https://thetilt-rust.vercel.app/assets/crest.png">
    <link rel="icon" type="image/svg+xml" href="assets/crest-icon.svg">
    <link rel="alternate icon" type="image/png" href="assets/crest-icon.png">
    <link rel="stylesheet" href="style.css">
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');</script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
    <nav class="top-nav"></nav>
    <script src="common.js"></script>
    <script>initNav(null);</script>

    <div class="container">
        <div id="content">
            <div class="loading">loading player...</div>
        </div>

        <div class="footer">
            data from <a href="https://cricsheet.org">cricsheet.org</a> |
            <a href="index.html">back to TILT</a>
        </div>
    </div>

<script>
// Batting/bowling average is undefined with zero dismissals/wickets — the
// exporter writes null in that case; render it as an em dash (issue #183).
const avgFmt = v => (v == null ? '—' : v);

function toggleSeason(id) {
    const row = document.getElementById(id);
    const chev = document.getElementById('chev-' + id);
    if (!row) return;
    if (row.style.display === 'none') {
        row.style.display = '';
        if (chev) chev.classList.add('open');
    } else {
        row.style.display = 'none';
        if (chev) chev.classList.remove('open');
    }
}

async function loadPlayer() {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('player');
    const season = params.get('season');

    if (!slug) {
        document.getElementById('content').innerHTML = '<div class="loading">no player specified</div>';
        return;
    }

    try {
        const res = await fetch(`data/players/${slug}.json`);
        if (!res.ok) throw new Error('not found');
        const p = await res.json();

        if (season) {
            return renderPlayerSeason(p, season, slug);
        }

        const teamIndex = await loadTeamIndex();
        const displayName = p.full_name && p.full_name !== p.player ? p.full_name : p.player;
        document.title = `The TILT | ${displayName}`;

        let html = `
            <div class="player-header">
                <h2>${flagSpan(p.country)}${displayName}</h2>
                ${p.full_name && p.full_name !== p.player ? `<div class="initials">${p.player}</div>` : ''}
                <div class="team">${(p.teams && p.teams.length > 0 ? p.teams : [p.team]).map(t => teamLink(t, null, teamIndex)).join(', ')} | ${p.total_matches} matches | ${p.batting_balls} balls faced | ${p.bowling_balls} balls bowled</div>
            </div>

            <div class="stat-grid">
                <div class="stat-card">
                    <div class="label">total TILT/match</div>
                    <div class="value">${formatTilt(p.shrunk_total_tilt_per_match || p.total_tilt_per_match)}</div>
                    <div style="color:var(--text-dim);font-size:0.7rem;margin-top:4px">shifts win probability by ${Math.abs((p.shrunk_total_tilt_per_match || p.total_tilt_per_match) * 100).toFixed(1)} percentage points per match</div>
                    ${p.tilt_ci_lower_90 != null && p.tilt_ci_upper_90 != null ? `<div style="color:var(--text-dim);font-size:0.7rem;margin-top:4px">90% CI: ${formatTilt(p.tilt_ci_lower_90)} to ${formatTilt(p.tilt_ci_upper_90)}</div>` : ''}
                    ${p.shrunk_total_tilt_per_match != null ? `<div style="color:var(--text-dim);font-size:0.65rem;margin-top:2px">raw: ${formatTilt(p.total_tilt_per_match)} | ${p.confidence || 'low'} confidence</div>` : ''}
                </div>
                <div class="stat-card">
                    <div class="label">batting TILT/match</div>
                    <div class="value">${p.shrunk_batting_tilt_per_match != null ? formatTilt(p.shrunk_batting_tilt_per_match) : p.batting_tilt_per_match != null ? formatTilt(p.batting_tilt_per_match) : '<span class="tilt-neutral">n/a</span>'}</div>
                    ${p.batting_tilt_per_match == null ? `<div style="color:var(--text-dim);font-size:0.65rem;margin-top:2px">${p.batting_balls} balls (min 50)</div>` : ''}
                </div>
                <div class="stat-card">
                    <div class="label">bowling TILT/match</div>
                    <div class="value">${p.shrunk_bowling_tilt_per_match != null ? formatTilt(p.shrunk_bowling_tilt_per_match) : p.bowling_tilt_per_match != null ? formatTilt(p.bowling_tilt_per_match) : '<span class="tilt-neutral">n/a</span>'}</div>
                    ${p.bowling_tilt_per_match == null ? `<div style="color:var(--text-dim);font-size:0.65rem;margin-top:2px">${p.bowling_balls} balls (min 50)</div>` : ''}
                </div>
            </div>
        `;

        // Batting statistics by season
        const seasonsWithBat = (p.seasons || []).filter(s => s.batting_stats);
        if (p.batting_stats || seasonsWithBat.length > 0) {
            html += '<div class="section"><h3>batting statistics</h3>';
            html += `<div class="table-wrap"><table class="detail-table">
                <tr><th>season</th><th class="hide-mobile">team</th><th class="hide-mobile">inn</th><th>runs</th><th>avg</th><th>SR</th><th class="hide-mobile">HS</th><th class="hide-mobile">50s</th><th class="hide-mobile">100s</th></tr>`;
            for (const s of seasonsWithBat) {
                const b = s.batting_stats;
                const seasonLnk = `<a href="player.html?player=${slug}&season=${encodeURIComponent(s.season)}">${s.season}</a>`;
                html += `<tr>
                    <td>${seasonLnk}</td>
                    <td class="hide-mobile"><span class="season-team">${teamLink(s.team, s.season, teamIndex)}</span></td>
                    <td class="hide-mobile">${b.innings}</td><td>${b.runs}</td><td>${avgFmt(b.avg)}</td><td>${b.sr}</td><td class="hide-mobile">${b.hs}</td><td class="hide-mobile">${b.fifties}</td><td class="hide-mobile">${b.hundreds}</td>
                </tr>`;
            }
            if (p.batting_stats) {
                const b = p.batting_stats;
                html += `<tr class="career-total">
                    <td colspan="2">career</td>
                    <td class="hide-mobile">${b.innings}</td><td>${b.runs}</td><td>${avgFmt(b.avg)}</td><td>${b.sr}</td><td class="hide-mobile">${b.hs}</td><td class="hide-mobile">${b.fifties}</td><td class="hide-mobile">${b.hundreds}</td>
                </tr>`;
            }
            html += '</table></div></div>';
        }

        // Bowling statistics by season
        const seasonsWithBowl = (p.seasons || []).filter(s => s.bowling_stats);
        if (p.bowling_stats || seasonsWithBowl.length > 0) {
            html += '<div class="section"><h3>bowling statistics</h3>';
            html += `<div class="table-wrap"><table class="detail-table">
                <tr><th>season</th><th class="hide-mobile">team</th><th class="hide-mobile">inn</th><th>wkts</th><th class="hide-mobile">runs</th><th>avg</th><th>econ</th><th class="hide-mobile">best</th></tr>`;
            for (const s of seasonsWithBowl) {
                const b = s.bowling_stats;
                const seasonLnk = `<a href="player.html?player=${slug}&season=${encodeURIComponent(s.season)}">${s.season}</a>`;
                html += `<tr>
                    <td>${seasonLnk}</td>
                    <td class="hide-mobile"><span class="season-team">${teamLink(s.team, s.season, teamIndex)}</span></td>
                    <td class="hide-mobile">${b.innings}</td><td>${b.wickets}</td><td class="hide-mobile">${b.runs_conceded}</td><td>${avgFmt(b.avg)}</td><td>${b.economy}</td><td class="hide-mobile">${b.best_figures}</td>
                </tr>`;
            }
            if (p.bowling_stats) {
                const b = p.bowling_stats;
                html += `<tr class="career-total">
                    <td colspan="2">career</td>
                    <td class="hide-mobile">${b.innings}</td><td>${b.wickets}</td><td class="hide-mobile">${b.runs_conceded}</td><td>${avgFmt(b.avg)}</td><td>${b.economy}</td><td class="hide-mobile">${b.best_figures}</td>
                </tr>`;
            }
            html += '</table></div></div>';
        }

        // Career ribbon — one bar per match, in chronological order.
        const ribbonMatches = (p.seasons || [])
            .flatMap(s => (s.matches || []).map(m => ({ ...m, season: s.season })))
            .sort((a, b) => (a.date || '').localeCompare(b.date || ''));
        if (ribbonMatches.length > 3) {
            html += `<div class="section"><h3>career ribbon</h3>
                <div class="chart-container" style="height:140px">
                    <canvas id="ribbonChart"></canvas>
                </div>
                <div style="color:var(--text-dim);font-size:0.65rem;margin-top:6px">each bar is one match in chronological order | bar height = total TILT, green positive / red negative | click a bar to open the match</div>
            </div>`;
        }

        // Season breakdown
        if (p.seasons && p.seasons.length > 0) {
            const maxSeasonTilt = Math.max(
                ...p.seasons.map(s => Math.abs(s.batting_tilt_per_match || 0)),
                ...p.seasons.map(s => Math.abs(s.bowling_tilt_per_match || 0)),
                0.01
            );
            html += `<div class="section"><h3>season by season game log</h3><div class="table-wrap"><table class="detail-table">
                <tr><th>season</th><th>bat TILT/m</th><th>bowl TILT/m</th><th class="hide-mobile"></th><th class="hide-mobile">bat m</th><th class="hide-mobile">bowl m</th></tr>`;
            p.seasons.sort((a, b) => a.season.localeCompare(b.season));
            for (const s of p.seasons) {
                const batTilt = s.batting_tilt_per_match || 0;
                const bowlTilt = s.bowling_tilt_per_match || 0;
                const totalTilt = batTilt + bowlTilt;
                const barW = Math.abs(totalTilt) / maxSeasonTilt * 80;
                const barCls = totalTilt >= 0 ? 'positive' : 'negative';
                const hasMatches = s.matches && s.matches.length > 0;
                const seasonId = 'season-' + s.season.replace(/[^a-z0-9]/gi, '');
                html += `<tr class="${hasMatches ? 'season-row-expandable' : ''}"
                    ${hasMatches ? `onclick="toggleSeason('${seasonId}')" style="cursor:pointer"` : ''}>
                    <td>
                        ${hasMatches ? `<span class="season-chevron" id="chev-${seasonId}">&#9654;</span>` : ''}
                        ${s.season}
                    </td>
                    <td>${formatTilt(batTilt)}</td>
                    <td>${formatTilt(bowlTilt)}</td>
                    <td class="hide-mobile"><div class="bar-container"><div class="bar-fill ${barCls}" style="width:${Math.min(barW, 80)}px"></div></div></td>
                    <td class="hide-mobile">${s.batting_matches || 0}</td>
                    <td class="hide-mobile">${s.bowling_matches || 0}</td>
                </tr>`;
                if (hasMatches) {
                    html += `<tr class="season-detail-row" id="${seasonId}" style="display:none">
                        <td colspan="6" style="padding:0">
                            <div class="season-matches">
                                <table class="match-sub-table">
                                    <tr>
                                        <th>date</th><th>vs</th><th>result</th>
                                        <th>runs</th><th>balls</th><th class="hide-mobile">SR</th>
                                        <th>wkts</th><th>overs</th><th>RC</th><th class="hide-mobile">econ</th>
                                        <th class="hide-mobile">bat TILT</th><th class="hide-mobile">bowl TILT</th><th>total</th>
                                    </tr>
                                    ${s.matches.map(m => {
                                        const won = m.winner == null ? 'NR' :
                                                    (m.winner !== m.opponent ? 'W' : 'L');
                                        const resultCls = won === 'W' ? 'result-win' : won === 'L' ? 'result-loss' : 'result-nr';
                                        return `<tr>
                                            <td><a href="match.html?id=${m.match_id}" class="match-link">${m.date}</a></td>
                                            <td>${m.opponent}</td>
                                            <td><span class="${resultCls}">${won}</span> <span class="match-scores">${m.team_score || ''} v ${m.opponent_score || ''}</span></td>
                                            <td>${m.bat_runs != null ? m.bat_runs + (m.bat_not_out ? '*' : '') : '-'}</td>
                                            <td>${m.bat_balls != null ? m.bat_balls : '-'}</td>
                                            <td class="hide-mobile">${m.bat_sr != null ? m.bat_sr : '-'}</td>
                                            <td>${m.bowl_wkts != null ? m.bowl_wkts : '-'}</td>
                                            <td>${m.bowl_balls != null ? Math.floor(m.bowl_balls/6) + '.' + (m.bowl_balls%6) : '-'}</td>
                                            <td>${m.bowl_runs != null ? m.bowl_runs : '-'}</td>
                                            <td class="hide-mobile">${m.bowl_econ != null ? m.bowl_econ : '-'}</td>
                                            <td class="hide-mobile">${m.bat_tilt != null ? formatTilt(m.bat_tilt) : '-'}</td>
                                            <td class="hide-mobile">${m.bowl_tilt != null ? formatTilt(m.bowl_tilt) : '-'}</td>
                                            <td>${formatTilt(m.total_tilt)}</td>
                                        </tr>`;
                                    }).join('')}
                                </table>
                            </div>
                        </td>
                    </tr>`;
                }
            }
            html += '</table></div></div>';
        }

        // Phase breakdown (batting)
        if (p.batting_phases && p.batting_phases.length > 0) {
            html += `<div class="section"><h3>by phase (batting)</h3><table class="detail-table">
                <tr><th>phase</th><th>avg TILT/ball</th><th>total TILT</th><th class="hide-mobile">balls</th></tr>`;
            for (const ph of p.batting_phases) {
                html += `<tr>
                    <td>${ph.phase}</td>
                    <td>${formatTilt(ph.avg_delta)}</td>
                    <td>${formatTilt(ph.tilt)}</td>
                    <td class="hide-mobile">${ph.balls}</td>
                </tr>`;
            }
            html += '</table></div>';
        }

        // Phase breakdown (bowling)
        if (p.bowling_phases && p.bowling_phases.length > 0) {
            html += `<div class="section"><h3>by phase (bowling)</h3><table class="detail-table">
                <tr><th>phase</th><th>avg TILT/ball</th><th>total TILT</th><th class="hide-mobile">balls</th></tr>`;
            for (const ph of p.bowling_phases) {
                html += `<tr>
                    <td>${ph.phase}</td>
                    <td>${formatTilt(ph.avg_delta)}</td>
                    <td>${formatTilt(ph.tilt)}</td>
                    <td class="hide-mobile">${ph.balls}</td>
                </tr>`;
            }
            html += '</table></div>';
        }

        // Best/worst batting performances (with match links)
        if (p.best_matches && p.best_matches.length > 0) {
            html += `<div class="section"><h3>best batting performances</h3><table class="detail-table">
                <tr><th>date</th><th>vs</th><th>TILT</th><th>runs</th><th>balls</th></tr>`;
            for (const m of p.best_matches) {
                const matchLink = m.match_id ? `match.html?id=${m.match_id}` : '#';
                html += `<tr onclick="window.location='${matchLink}'" style="cursor:pointer">
                    <td><a href="${matchLink}" class="match-link">${m.date}</a></td><td>${m.vs}</td>
                    <td>${formatTilt(m.tilt)}</td><td>${m.runs}${m.not_out ? '*' : ''}</td><td>${m.balls}</td>
                </tr>`;
            }
            html += '</table></div>';
        }

        if (p.worst_matches && p.worst_matches.length > 0) {
            html += `<div class="section"><h3>worst batting performances</h3><table class="detail-table">
                <tr><th>date</th><th>vs</th><th>TILT</th><th>runs</th><th>balls</th></tr>`;
            for (const m of p.worst_matches) {
                const matchLink = m.match_id ? `match.html?id=${m.match_id}` : '#';
                html += `<tr onclick="window.location='${matchLink}'" style="cursor:pointer">
                    <td><a href="${matchLink}" class="match-link">${m.date}</a></td><td>${m.vs}</td>
                    <td>${formatTilt(m.tilt)}</td><td>${m.runs}${m.not_out ? '*' : ''}</td><td>${m.balls}</td>
                </tr>`;
            }
            html += '</table></div>';
        }

        // Best/worst bowling performances (with match links)
        if (p.bowling_best_matches && p.bowling_best_matches.length > 0) {
            html += `<div class="section"><h3>best bowling performances</h3><table class="detail-table">
                <tr><th>date</th><th>vs</th><th>TILT</th><th>wickets</th><th>balls</th></tr>`;
            for (const m of p.bowling_best_matches) {
                const matchLink = m.match_id ? `match.html?id=${m.match_id}` : '#';
                html += `<tr onclick="window.location='${matchLink}'" style="cursor:pointer">
                    <td><a href="${matchLink}" class="match-link">${m.date}</a></td><td>${m.vs}</td>
                    <td>${formatTilt(m.tilt)}</td><td>${m.wickets}</td><td>${m.balls}</td>
                </tr>`;
            }
            html += '</table></div>';
        }

        if (p.bowling_worst_matches && p.bowling_worst_matches.length > 0) {
            html += `<div class="section"><h3>worst bowling performances</h3><table class="detail-table">
                <tr><th>date</th><th>vs</th><th>TILT</th><th>wickets</th><th>balls</th></tr>`;
            for (const m of p.bowling_worst_matches) {
                const matchLink = m.match_id ? `match.html?id=${m.match_id}` : '#';
                html += `<tr onclick="window.location='${matchLink}'" style="cursor:pointer">
                    <td><a href="${matchLink}" class="match-link">${m.date}</a></td><td>${m.vs}</td>
                    <td>${formatTilt(m.tilt)}</td><td>${m.wickets}</td><td>${m.balls}</td>
                </tr>`;
            }
            html += '</table></div>';
        }

        // Career trend chart
        if (p.career_trend && p.career_trend.length > 1) {
            html += `<div class="section"><h3>career TILT trend</h3>
                <div class="chart-container" style="height:220px">
                    <canvas id="careerChart"></canvas>
                </div></div>`;
        }

        // Team matchups chart
        if (p.team_matchups && p.team_matchups.length > 0) {
            html += `<div class="section"><h3>batting TILT by opponent</h3>
                <div class="chart-container" style="height:${Math.max(150, p.team_matchups.length * 28)}px">
                    <canvas id="matchupChart"></canvas>
                </div></div>`;
        }

        // Bowling team matchups chart
        if (p.bowling_team_matchups && p.bowling_team_matchups.length > 0) {
            html += `<div class="section"><h3>bowling TILT by opponent</h3>
                <div class="chart-container" style="height:${Math.max(150, p.bowling_team_matchups.length * 28)}px">
                    <canvas id="bowlingMatchupChart"></canvas>
                </div></div>`;
        }

        document.getElementById('content').innerHTML = html;

        // Render career ribbon — chronological bar chart of per-match total TILT.
        // Y-axis intentionally hidden: viewers read shape and sign, not exact %.
        // Hover for date/opponent/TILT, click to open the match.
        if (ribbonMatches.length > 3) {
            // Categorical x-axis: one slot per match → uniform bar widths
            // regardless of dense/sparse season mix. Year labels are placed at
            // first-match-of-year indices, then thinned by a greedy collision
            // filter so adjacent labels can't squeeze together.
            const ribbonData = ribbonMatches.map(m =>
                +(((m.total_tilt) || 0) * 100).toFixed(2));
            const greenStrong = cssVar('--accent-green');
            const redStrong = cssVar('--accent-red');
            const colors = ribbonMatches.map(m =>
                ((m.total_tilt || 0) >= 0 ? greenStrong : redStrong) + 'cc');

            const yearChangeIndices = [];
            let lastYear = '';
            ribbonMatches.forEach((m, i) => {
                const y = (m.date || '').slice(0, 4);
                if (y && y !== lastYear) yearChangeIndices.push(i);
                if (y) lastYear = y;
            });
            const minGap = Math.max(5, Math.ceil(ribbonMatches.length / 18));
            const showAt = new Set();
            let lastShown = -Infinity;
            yearChangeIndices.forEach(i => {
                if (i - lastShown >= minGap) { showAt.add(i); lastShown = i; }
            });
            const labels = ribbonMatches.map((m, i) =>
                showAt.has(i) ? `'${(m.date || '').slice(2, 4)}` : '');

            new Chart(document.getElementById('ribbonChart'), {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        data: ribbonData,
                        backgroundColor: colors,
                        borderWidth: 0,
                        borderRadius: 0,
                        barPercentage: 1.0,
                        categoryPercentage: 1.0,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    onClick: (_evt, items) => {
                        if (!items || items.length === 0) return;
                        const m = ribbonMatches[items[0].index];
                        if (m && m.match_id) window.location.href = `match.html?id=${m.match_id}`;
                    },
                    onHover: (evt, items) => {
                        evt.native.target.style.cursor = items.length ? 'pointer' : 'default';
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                title: (items) => {
                                    const m = ribbonMatches[items[0].dataIndex];
                                    return `${m.date} vs ${m.opponent || '?'}`;
                                },
                                label: (item) => {
                                    const v = item.parsed.y;
                                    const sign = v >= 0 ? '+' : '';
                                    return `TILT ${sign}${v.toFixed(2)}%`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'category',
                            ticks: {
                                color: cssVar('--text-muted'),
                                font: { size: 10 },
                                maxRotation: 0,
                                autoSkip: false,
                            },
                            grid: { display: false }
                        },
                        y: {
                            display: false,
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        // Render career trend chart
        if (p.career_trend && p.career_trend.length > 1) {
            new Chart(document.getElementById('careerChart'), {
                type: 'line',
                data: {
                    labels: p.career_trend.map(t => t.match),
                    datasets: [{
                        label: 'Cumulative TILT',
                        data: p.career_trend.map(t => +(t.cumulative * 100).toFixed(2)),
                        borderColor: cssVar('--accent-green'),
                        backgroundColor: cssVar('--accent-green-dim'),
                        fill: true,
                        tension: 0.3,
                        pointRadius: p.career_trend.length > 50 ? 0 : 2,
                        pointHoverRadius: 4,
                        borderWidth: 1.5,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                title: (items) => {
                                    const i = items[0].dataIndex;
                                    const t = p.career_trend[i];
                                    return `Match ${t.match} (${t.date})`;
                                },
                                label: (item) => {
                                    const i = item.dataIndex;
                                    const t = p.career_trend[i];
                                    const sign = t.tilt >= 0 ? '+' : '';
                                    return `Cumulative: ${item.formattedValue}% | This match: ${sign}${(t.tilt*100).toFixed(2)}%`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: { title: { display: true, text: 'Match #', color: cssVar('--text-muted'), font: { size: 11 } }, ticks: { color: cssVar('--text-muted') }, grid: { color: cssVar('--border') } },
                        y: { title: { display: true, text: 'Cumulative TILT %', color: cssVar('--text-muted'), font: { size: 11 } }, ticks: { color: cssVar('--text-muted') }, grid: { color: cssVar('--border') } }
                    }
                }
            });
        }

        // Render matchup chart
        const renderMatchupChart = (canvasId, matchups) => {
            new Chart(document.getElementById(canvasId), {
                type: 'bar',
                data: {
                    labels: matchups.map(m => m.opponent),
                    datasets: [{
                        label: 'TILT/match',
                        data: matchups.map(m => +(m.tilt_per_match * 100).toFixed(2)),
                        backgroundColor: matchups.map(m => m.tilt_per_match >= 0 ? cssVar('--accent-green') + '80' : cssVar('--accent-red') + '80'),
                        borderColor: matchups.map(m => m.tilt_per_match >= 0 ? cssVar('--accent-green') : cssVar('--accent-red')),
                        borderWidth: 1,
                        borderRadius: 2,
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (item) => {
                                    const m = matchups[item.dataIndex];
                                    return `${item.formattedValue}% (${m.matches} matches)`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: { title: { display: true, text: 'TILT/match %', color: cssVar('--text-muted'), font: { size: 11 } }, ticks: { color: cssVar('--text-muted') }, grid: { color: cssVar('--border') } },
                        y: { ticks: { color: cssVar('--text-secondary'), font: { size: 11 } }, grid: { display: false } }
                    }
                }
            });
        };
        if (p.team_matchups && p.team_matchups.length > 0) {
            renderMatchupChart('matchupChart', p.team_matchups);
        }
        if (p.bowling_team_matchups && p.bowling_team_matchups.length > 0) {
            renderMatchupChart('bowlingMatchupChart', p.bowling_team_matchups);
        }

    } catch (e) {
        document.getElementById('content').innerHTML = '<div class="loading">player not found</div>';
    }
}

async function renderPlayerSeason(p, season, slug) {
    const teamIndex = await loadTeamIndex();
    const displayName = p.full_name && p.full_name !== p.player ? p.full_name : p.player;
    document.title = `The TILT | ${displayName} ${season}`;
    const s = (p.seasons || []).find((x) => x.season === season);
    if (!s) {
        document.getElementById('content').innerHTML = `
            <div class="player-header">
                <h2>${displayName}</h2>
                <div class="meta">no data for season ${season} | <a href="player.html?player=${slug}" class="match-link">back to career</a></div>
            </div>`;
        return;
    }

    const teamLabel = s.team ? teamLink(s.team, season, teamIndex) : '—';
    const totalMatches = (s.batting_matches || 0) > (s.bowling_matches || 0) ? s.batting_matches : s.bowling_matches;

    let html = `
        <div class="player-header">
            <h2>${flagSpan(p.country)}${displayName} | ${season}</h2>
            <div class="team">${teamLabel} · ${totalMatches} matches</div>
            <div class="meta">
                <a href="player.html?player=${slug}" class="match-link">back to ${displayName}'s career</a> ·
                <a href="season.html?season=${encodeURIComponent(season)}" class="match-link">all of IPL ${season}</a>
            </div>
        </div>

        <div class="stat-grid">
            <div class="stat-card">
                <div class="label">batting TILT/m</div>
                <div class="value">${formatTilt(s.batting_tilt_per_match)}</div>
            </div>
            <div class="stat-card">
                <div class="label">bowling TILT/m</div>
                <div class="value">${formatTilt(s.bowling_tilt_per_match)}</div>
            </div>
        </div>
    `;

    if (s.batting_stats) {
        const b = s.batting_stats;
        html += `
            <h3 class="section-title">Batting</h3>
            <div class="table-wrap">
                <table class="detail-table">
                    <thead><tr><th>inn</th><th>runs</th><th class="hide-mobile">balls</th><th>avg</th><th>SR</th><th class="hide-mobile">HS</th><th class="hide-mobile">50s</th><th class="hide-mobile">100s</th><th class="hide-mobile">NO</th></tr></thead>
                    <tbody><tr>
                        <td>${b.innings}</td><td>${b.runs}</td><td class="hide-mobile">${b.balls}</td>
                        <td>${avgFmt(b.avg)}</td><td>${b.sr}</td><td class="hide-mobile">${b.hs}</td>
                        <td class="hide-mobile">${b.fifties}</td><td class="hide-mobile">${b.hundreds}</td><td class="hide-mobile">${b.not_outs}</td>
                    </tr></tbody>
                </table>
            </div>`;
    }

    if (s.bowling_stats) {
        const w = s.bowling_stats;
        html += `
            <h3 class="section-title">Bowling</h3>
            <div class="table-wrap">
                <table class="detail-table">
                    <thead><tr><th>inn</th><th>wkts</th><th class="hide-mobile">balls</th><th class="hide-mobile">runs</th><th>avg</th><th>econ</th><th class="hide-mobile">best</th></tr></thead>
                    <tbody><tr>
                        <td>${w.innings}</td><td>${w.wickets}</td><td class="hide-mobile">${w.balls}</td>
                        <td class="hide-mobile">${w.runs_conceded}</td><td>${avgFmt(w.avg)}</td><td>${w.economy}</td>
                        <td class="hide-mobile">${w.best_figures}</td>
                    </tr></tbody>
                </table>
            </div>`;
    }

    if (s.matches && s.matches.length > 0) {
        html += `
            <h3 class="section-title">Match log</h3>
            <div class="table-wrap">
                <table class="detail-table">
                    <thead><tr><th>date</th><th>opponent</th><th class="hide-mobile">Scores</th><th>runs</th><th class="hide-mobile">balls</th><th class="hide-mobile">SR</th><th>wkts</th><th class="hide-mobile">RC</th><th class="hide-mobile">econ</th><th>TILT</th></tr></thead>
                    <tbody>
                        ${s.matches.map((m) => `
                            <tr>
                                <td><a href="match.html?id=${m.match_id}" class="match-link">${m.date}</a></td>
                                <td>${teamLink(m.opponent, season, teamIndex)}</td>
                                <td class="hide-mobile">${m.team_score || '—'} vs ${m.opponent_score || '—'}</td>
                                <td>${m.bat_runs != null ? m.bat_runs + (m.bat_not_out ? '*' : '') : '—'}</td>
                                <td class="hide-mobile">${m.bat_balls != null ? m.bat_balls : '—'}</td>
                                <td class="hide-mobile">${m.bat_sr != null ? m.bat_sr.toFixed(1) : '—'}</td>
                                <td>${m.bowl_wkts != null ? m.bowl_wkts : '—'}</td>
                                <td class="hide-mobile">${m.bowl_runs != null ? m.bowl_runs : '—'}</td>
                                <td class="hide-mobile">${m.bowl_econ != null ? m.bowl_econ.toFixed(2) : '—'}</td>
                                <td>${formatTilt(m.total_tilt)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>`;
    }

    document.getElementById('content').innerHTML = html;
}

loadPlayer();
</script>
