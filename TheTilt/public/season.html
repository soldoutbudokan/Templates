<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The TILT — Season</title>
    <link rel="stylesheet" href="style.css">
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');</script>
</head>
<body>
    <nav class="top-nav"></nav>
    <script src="common.js"></script>
    <script>initNav('season');</script>

    <div class="container">
        <div id="content">
            <div class="loading">loading season…</div>
        </div>
        <div class="footer">
            data from <a href="https://cricsheet.org">cricsheet.org</a> |
            <a href="index.html">back to TILT</a>
        </div>
    </div>

<script>
const STAT_LABELS = {
    runs: 'Runs',
    wickets: 'Wickets',
    batting_tilt: 'Batting TILT',
    bowling_tilt: 'Bowling TILT',
    total_tilt: 'Total TILT',
    sr: 'Strike Rate',
    economy: 'Economy',
    fifties: 'Fifties',
    hundreds: 'Hundreds',
    fours: 'Fours',
    sixes: 'Sixes',
};

const STAT_ORDER = [
    'total_tilt', 'batting_tilt', 'bowling_tilt',
    'runs', 'wickets', 'sr', 'economy',
    'fifties', 'hundreds', 'fours', 'sixes',
];

function isTiltStat(stat) {
    return stat.endsWith('_tilt');
}

function formatLeaderValue(stat, value) {
    if (isTiltStat(stat)) return formatTilt(value);
    if (stat === 'sr' || stat === 'economy') return Number(value).toFixed(2);
    return String(value);
}

async function loadSeason() {
    const params = new URLSearchParams(window.location.search);
    let season = params.get('season');
    const teamIndex = await loadTeamIndex();

    // If no season param, default to latest from meta.json
    if (!season) {
        try {
            const m = await (await fetch('data/meta.json')).json();
            season = (m.seasons || []).slice(-1)[0];
            if (season) {
                window.history.replaceState(null, '', `season.html?season=${encodeURIComponent(season)}`);
            }
        } catch (e) { /* fall through */ }
        if (!season) {
            document.getElementById('content').innerHTML = '<div class="loading">no season specified</div>';
            return;
        }
    }

    let data;
    try {
        const seasonSlug = season.replace('/', '-');
        const res = await fetch(`data/seasons/${seasonSlug}.json`);
        if (!res.ok) throw new Error('not found');
        data = await res.json();
    } catch (e) {
        document.getElementById('content').innerHTML = `<div class="loading">no data for season ${season}</div>`;
        return;
    }

    // Season picker chips
    let allSeasons = [];
    try {
        const m = await (await fetch('data/meta.json')).json();
        allSeasons = (m.seasons || []).slice().reverse();
    } catch (e) {}

    const seasonChips = allSeasons.map((s) => {
        const cls = s === data.season ? 'picker-chip active' : 'picker-chip';
        return `<a href="season.html?season=${encodeURIComponent(s)}" class="${cls}">${s}</a>`;
    }).join('');

    const inProgress = data.matches < 60 && Number(data.season_year) >= new Date().getFullYear() - 1
        ? `<div class="subtitle">season in progress — ${data.matches} matches played</div>`
        : `<div class="subtitle">${data.matches} matches</div>`;

    let html = `
        <div class="page-header">
            <h1>IPL ${data.season}</h1>
            ${inProgress}
            ${data.champion ? `<div class="meta">Champion: ${teamLink(data.champion, data.season, teamIndex)}</div>` : ''}
        </div>
        <div class="season-picker-chips">${seasonChips}</div>

        <h2 class="section-title">Standings</h2>
        <div class="table-wrap">
            <table class="detail-table">
                <thead><tr><th>#</th><th>Team</th><th>P</th><th>W</th><th>L</th><th>NR</th><th>Pts</th><th>NRR</th><th>Team TILT/m</th></tr></thead>
                <tbody>
                    ${data.team_table.map((t) => {
                        const pts = (t.points != null) ? t.points : (t.wins * 2 + (t.no_results || 0));
                        return `
                        <tr>
                            <td>${t.position_est}</td>
                            <td>${teamLink(t.team, data.season, teamIndex)}</td>
                            <td>${t.matches}</td>
                            <td>${t.wins}</td>
                            <td>${t.losses}</td>
                            <td>${t.no_results || 0}</td>
                            <td>${pts}</td>
                            <td>${t.nrr != null ? (t.nrr > 0 ? '+' : '') + t.nrr.toFixed(2) : '—'}</td>
                            <td>${formatTilt(t.team_tilt_per_match)}</td>
                        </tr>
                    `;
                    }).join('')}
                </tbody>
            </table>
        </div>

        <h2 class="section-title">Leaders</h2>
        <div class="leaders-grid">
            ${STAT_ORDER.map((stat) => {
                const rows = data.leaders[stat] || [];
                if (rows.length === 0) return '';
                return `
                    <div class="leader-tile">
                        <div class="leader-tile-header">
                            <span class="leader-tile-title">${STAT_LABELS[stat]}</span>
                            <a class="leader-see-all" href="leaders.html?season=${encodeURIComponent(data.season)}&stat=${stat}">see all →</a>
                        </div>
                        <ol class="leader-list">
                            ${rows.map((r, i) => `
                                <li>
                                    <span class="leader-rank">${i + 1}.</span>
                                    <a href="player.html?player=${r.slug}" class="leader-player">${flagSpan(r.country)}${r.player}</a>
                                    <span class="leader-team">${teamLink(r.team, data.season, teamIndex, { cls: 'team-link-subtle' })}</span>
                                    <span class="leader-value">${formatLeaderValue(stat, r.value)}</span>
                                </li>
                            `).join('')}
                        </ol>
                    </div>
                `;
            }).join('')}
        </div>

        ${renderPlayoffsBracket(data, teamIndex)}

        <h2 class="section-title">Matches</h2>
        <div class="table-wrap">
            <table class="detail-table">
                <thead><tr><th>Date</th><th>Teams</th><th>Score</th><th>Toss</th><th>Result</th><th>Venue</th></tr></thead>
                <tbody>
                    ${data.matches_list.map((m) => {
                        const scores = m.scores || {};
                        const scoreCell = m.teams.map((t) => {
                            const s = scores[t];
                            return s ? `${s}` : '—';
                        }).join(' / ');
                        const teamsCell = m.teams.map((t) => teamLink(t, data.season, teamIndex)).join(' vs ');
                        const tossCell = m.toss_winner
                            ? `${teamLink(m.toss_winner, data.season, teamIndex, { cls: 'team-link-subtle' })} → ${m.toss_decision || ''}`
                            : '—';
                        const resultCell = m.winner
                            ? `${teamLink(m.winner, data.season, teamIndex)}${m.result_margin ? ` <span class="result-margin">(${m.result_margin})</span>` : ''}`
                            : (m.result_margin || '—');
                        const stageBadge = m.event_stage ? ` <span class="stage-badge">${m.event_stage}</span>` : '';
                        return `
                            <tr>
                                <td><a href="match.html?id=${m.match_id}" class="match-link">${m.date}</a>${stageBadge}</td>
                                <td>${teamsCell}</td>
                                <td>${scoreCell}</td>
                                <td>${tossCell}</td>
                                <td>${resultCell}</td>
                                <td>${m.venue || ''}</td>
                            </tr>
                        `;
                    }).join('')}
                </tbody>
            </table>
        </div>
    `;

    document.getElementById('content').innerHTML = html;
}

function renderPlayoffsBracket(data, teamIndex) {
    const playoffs = data.playoffs || [];
    if (playoffs.length === 0) return '';

    const card = (p) => {
        if (!p) return '<div class="bracket-card empty">—</div>';
        const [t1, t2] = p.teams;
        const s1 = (p.scores || {})[t1];
        const s2 = (p.scores || {})[t2];
        const winnerCls = (team) => p.winner === team ? 'bracket-team winner' : 'bracket-team';
        return `
            <div class="bracket-card">
                <div class="bracket-stage">${p.stage}</div>
                <a href="match.html?id=${p.match_id}" class="bracket-match-link">
                    <div class="${winnerCls(t1)}">
                        <span class="bracket-team-name">${teamLink(t1, data.season, teamIndex, { cls: 'team-link-subtle' })}</span>
                        <span class="bracket-team-score">${s1 || ''}</span>
                    </div>
                    <div class="${winnerCls(t2)}">
                        <span class="bracket-team-name">${teamLink(t2, data.season, teamIndex, { cls: 'team-link-subtle' })}</span>
                        <span class="bracket-team-score">${s2 || ''}</span>
                    </div>
                    ${p.result_margin ? `<div class="bracket-margin">${p.result_margin}</div>` : ''}
                </a>
            </div>
        `;
    };

    // Modern format (2011+): Q1 / Eliminator / Q2 / Final → 3-column bracket.
    // Older formats (2008-2010 semis + 3rd place + final, plus any other
    // historical layout) → simple flat list ordered by date.
    const byStage = {};
    for (const p of playoffs) byStage[p.stage] = p;
    const modern = ['Qualifier 1', 'Eliminator', 'Qualifier 2', 'Final']
        .every(s => byStage[s]);

    let inner = '';
    if (modern) {
        inner = `
            <div class="bracket bracket-modern">
                <div class="bracket-col">
                    ${card(byStage['Qualifier 1'])}
                    ${card(byStage['Eliminator'])}
                </div>
                <div class="bracket-col">
                    ${card(byStage['Qualifier 2'])}
                </div>
                <div class="bracket-col">
                    ${card(byStage['Final'])}
                </div>
            </div>
        `;
    } else {
        inner = `<div class="bracket bracket-flat">${playoffs.map(card).join('')}</div>`;
    }

    return `
        <h2 class="section-title">Playoffs</h2>
        ${inner}
    `;
}

loadSeason();
</script>
</body>
</html>
