<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The TILT | Season</title>
    <meta name="description" content="IPL season standings, leaders, and TILT for a given year.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://thetilt-rust.vercel.app/season.html">
    <meta property="og:title" content="The TILT | Season">
    <meta property="og:description" content="IPL season standings, leaders, and TILT for a given year.">
    <meta property="og:image" content="https://thetilt-rust.vercel.app/assets/crest.png">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="The TILT | Season">
    <meta name="twitter:description" content="IPL season standings, leaders, and TILT for a given year.">
    <meta name="twitter:image" content="https://thetilt-rust.vercel.app/assets/crest.png">
    <link rel="icon" type="image/svg+xml" href="assets/crest-icon.svg">
    <link rel="alternate icon" type="image/png" href="assets/crest-icon.png">
    <link rel="stylesheet" href="style.css">
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');</script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <nav class="top-nav"></nav>
    <script src="common.js"></script>
    <script>initNav('season');</script>

    <div class="container">
        <div id="content">
            <div class="loading">loading season…</div>
        </div>
        <div class="footer">
            data from <a href="https://cricsheet.org">cricsheet.org</a> |
            <a href="index.html">back to TILT</a>
        </div>
    </div>

<script>
// Shared with leaders.html via common.js so chip labels/order can't drift (#138).
const STAT_LABELS = window.STAT_LABELS;
const STAT_ORDER = window.STAT_ORDER;

function isTiltStat(stat) {
    return stat.endsWith('_tilt');
}

function formatLeaderValue(stat, value) {
    if (isTiltStat(stat)) return formatTilt(value);
    if (stat === 'sr' || stat === 'economy') return Number(value).toFixed(2);
    return String(value);
}

async function loadSeason() {
    const params = new URLSearchParams(window.location.search);
    let season = params.get('season');
    const teamIndex = await loadTeamIndex();

    // Fetch meta once — reused for both default-season resolution and the
    // picker chips below, instead of fetching data/meta.json twice (#151).
    let meta = null;
    try { meta = await (await fetch('data/meta.json')).json(); } catch (e) { /* fall through */ }

    // If no season param, default to latest.
    if (!season) {
        season = (meta?.seasons || []).slice(-1)[0];
        if (season) {
            window.history.replaceState(null, '', `season.html?season=${encodeURIComponent(season)}`);
        }
        if (!season) {
            document.getElementById('content').innerHTML = '<div class="loading">no season specified</div>';
            return;
        }
    }

    let data;
    try {
        const seasonSlug = season.replace('/', '-');
        const res = await fetch(`data/seasons/${seasonSlug}.json`);
        if (!res.ok) throw new Error('not found');
        data = await res.json();
        document.title = `The TILT | IPL ${data.season}`;
    } catch (e) {
        document.getElementById('content').innerHTML = `<div class="loading">no data for season ${season}</div>`;
        return;
    }

    // Season picker chips (reuse the meta fetched above, #151).
    const allSeasons = (meta?.seasons || []).slice().reverse();

    const seasonChips = allSeasons.map((s) => {
        const cls = s === data.season ? 'picker-chip active' : 'picker-chip';
        return `<a href="season.html?season=${encodeURIComponent(s)}" class="${cls}">${s}</a>`;
    }).join('');

    // A season is "in progress" until it has a champion (mirrors index.html). The
    // old matches<60 threshold broke mid-playoffs for the 74-match modern IPL (#124).
    const inProgress = data.champion == null
        ? `<div class="subtitle">season in progress | ${data.matches} matches played</div>`
        : `<div class="subtitle">${data.matches} matches</div>`;

    let html = `
        <div class="page-header">
            <h1>IPL ${data.season}</h1>
            ${inProgress}
            ${data.champion ? `<div class="meta">Champion: ${teamLink(data.champion, data.season, teamIndex)}</div>` : ''}
        </div>
        <div class="season-picker-chips">${seasonChips}</div>

        <h2 class="section-title">Standings</h2>
        <div class="table-wrap">
            <table class="detail-table">
                <thead><tr><th>#</th><th>Team</th><th>P</th><th>W</th><th>L</th><th class="hide-mobile">NR</th><th>Pts</th><th class="hide-mobile">NRR</th><th class="hide-mobile">Team TILT/m</th></tr></thead>
                <tbody>
                    ${data.team_table.map((t) => {
                        const pts = (t.points != null) ? t.points : (t.wins * 2 + (t.no_results || 0));
                        return `
                        <tr>
                            <td>${t.position_est}</td>
                            <td>${teamLink(t.team, data.season, teamIndex)}</td>
                            <td>${t.matches}</td>
                            <td>${t.wins}</td>
                            <td>${t.losses}</td>
                            <td class="hide-mobile">${t.no_results || 0}</td>
                            <td>${pts}</td>
                            <td class="hide-mobile">${t.nrr != null ? (t.nrr > 0 ? '+' : '') + t.nrr.toFixed(2) : '—'}</td>
                            <td class="hide-mobile">${formatTilt(t.team_tilt_per_match)}</td>
                        </tr>
                    `;
                    }).join('')}
                </tbody>
            </table>
        </div>
        <div class="nrr-note">NRR may differ from official sources by a few hundredths in DLS-affected matches — see the <a href="about.html">about page</a>.</div>

        ${renderPlayoffsBracket(data, teamIndex)}

        <h2 class="section-title">Leaders</h2>
        <div class="leaders-grid">
            ${STAT_ORDER.map((stat) => {
                const rows = data.leaders[stat] || [];
                if (rows.length === 0) return '';
                return `
                    <div class="leader-tile">
                        <div class="leader-tile-header">
                            <span class="leader-tile-title">${STAT_LABELS[stat]}</span>
                            <a class="leader-see-all" href="leaders.html?season=${encodeURIComponent(data.season)}&stat=${stat}">see all →</a>
                        </div>
                        <ol class="leader-list">
                            ${rows.map((r, i) => `
                                <li>
                                    <span class="leader-rank">${i + 1}.</span>
                                    <a href="player.html?player=${r.slug}" class="leader-player">${flagSpan(r.country)}${r.player}</a>
                                    <span class="leader-team">${teamLink(r.team, data.season, teamIndex, { cls: 'team-link-subtle' })}</span>
                                    <span class="leader-value">${formatLeaderValue(stat, r.value)}</span>
                                </li>
                            `).join('')}
                        </ol>
                    </div>
                `;
            }).join('')}
        </div>

        <h2 class="section-title">Matches</h2>
        <div class="table-wrap">
            <table class="detail-table">
                <thead><tr><th>Date</th><th>Teams</th><th class="hide-mobile">Score</th><th class="hide-mobile">Toss</th><th>Result</th><th class="hide-mobile">Venue</th></tr></thead>
                <tbody>
                    ${data.matches_list.map((m) => {
                        const scores = m.scores || {};
                        const scoreCell = m.teams.map((t) => {
                            const s = scores[t];
                            return s ? `${s}` : '—';
                        }).join(' / ');
                        const teamsCell = m.teams.map((t) => teamLink(t, data.season, teamIndex)).join(' vs ');
                        const tossCell = m.toss_winner
                            ? `${teamLink(m.toss_winner, data.season, teamIndex, { cls: 'team-link-subtle' })} won the toss and chose to ${m.toss_decision || ''}`
                            : '—';
                        const resultCell = m.winner
                            ? `${teamLink(m.winner, data.season, teamIndex)}${m.result_margin ? ` <span class="result-margin">(${m.result_margin})</span>` : ''}`
                            : (m.result_margin || '—');
                        const stageBadge = m.event_stage ? ` <span class="stage-badge">${m.event_stage}</span>` : '';
                        return `
                            <tr>
                                <td><a href="match.html?id=${m.match_id}" class="match-link">${m.date}</a>${stageBadge}</td>
                                <td>${teamsCell}</td>
                                <td class="hide-mobile">${scoreCell}</td>
                                <td class="hide-mobile">${tossCell}</td>
                                <td>${resultCell}</td>
                                <td class="hide-mobile">${m.venue || ''}</td>
                            </tr>
                        `;
                    }).join('')}
                </tbody>
            </table>
        </div>
    `;

    document.getElementById('content').innerHTML = html;
    initBracketHover();
}

// Highlight all three cells (seed/team/score) of a bracket match when any one
// is hovered. The rowspan-heavy table layout means matches don't share a clean
// DOM parent, so CSS sibling selectors can't reach the other cells — hence JS.
function initBracketHover() {
    const cells = document.querySelectorAll('.brk-cell-link[data-match-id]');
    cells.forEach((cell) => {
        cell.addEventListener('mouseenter', () => {
            const id = cell.getAttribute('data-match-id');
            document
                .querySelectorAll(`.brk-cell-link[data-match-id="${id}"]`)
                .forEach((sibling) => sibling.classList.add('brk-match-hover'));
        });
        cell.addEventListener('mouseleave', () => {
            const id = cell.getAttribute('data-match-id');
            document
                .querySelectorAll(`.brk-cell-link[data-match-id="${id}"]`)
                .forEach((sibling) => sibling.classList.remove('brk-match-hover'));
        });
    });
}

function renderPlayoffsBracket(data, teamIndex) {
    const playoffs = data.playoffs || [];
    if (playoffs.length === 0) return '';

    // Treat 2011's "Elimination Final" as the modern Eliminator slot.
    const normStage = (s) => s === 'Elimination Final' ? 'Eliminator' : s;
    const byStage = {};
    for (const p of playoffs) byStage[normStage(p.stage)] = p;

    // Modern page-playoff format (2011+): Qualifier 1 + Eliminator + Qualifier 2
    // + Final. Render the full bracket as soon as the season reaches the playoffs
    // (Qualifier 1 present), filling not-yet-played / not-yet-in-Cricsheet slots
    // with placeholders rather than collapsing to the flat card view (which looked
    // broken mid-playoffs, e.g. 2026 with only Q1 + Eliminator in the data).
    const isModern = !!(byStage['Qualifier 1'] || byStage['Qualifier 2']);

    // Classic format (2008–2010): two Semi Finals + Final, plus optional
    // 3rd Place Play-Off in 2010. Two semis share the same `stage` label
    // so we can't index uniquely by stage — count instead.
    const semis = playoffs.filter(p => p.stage === 'Semi Final');
    const isClassic = !isModern && semis.length === 2 && playoffs.some(p => p.stage === 'Final');

    let inner;
    if (isModern) {
        inner = renderModernBracket(data, teamIndex, byStage);
    } else if (isClassic) {
        inner = renderClassicBracket(data, teamIndex, playoffs, semis);
    } else {
        inner = renderFlatBracket(data, teamIndex, playoffs);
    }

    return `
        <h2 class="section-title">Playoffs</h2>
        ${inner}
    `;
}

// Season-specific display label for a bracket cell (issue #190): the playoffs
// arrays store raw canonical names, so without this the 2017 bracket printed
// "Rising Pune Supergiants" (plural) while the standings table two sections
// above printed the singular via teamLink(). Logic (winner/seed comparisons)
// stays on the raw canonical string; only display goes through here.
function bracketLabel(name, data, teamIndex) {
    if (!name) return name;
    const t = teamIndex && teamIndex.get(name);
    return t ? teamLabelForSeason(t, data.season) : name;
}

function renderFlatBracket(data, teamIndex, playoffs) {
    const card = (p) => {
        const [t1, t2] = p.teams;
        const scores = p.scores || {};
        const row = (t) => {
            const isW = p.winner === t;
            const s = scores[t] || '';
            return `<div class="brk-flat-row${isW ? ' winner' : ''}">
                        <span class="brk-flat-team">${bracketLabel(t, data, teamIndex)}</span>
                        <span class="brk-flat-score">${s}</span>
                    </div>`;
        };
        return `
            <a class="brk-flat-card" href="match.html?id=${p.match_id}">
                <div class="brk-flat-header">
                    <span class="brk-flat-stage">${p.stage}</span>
                    <span class="brk-flat-date">${p.date || ''}</span>
                </div>
                ${row(t1)}
                ${row(t2)}
            </a>
        `;
    };
    return `<div class="bracket-flat">${playoffs.map(card).join('')}</div>`;
}

// 2008–2010 single-elimination format: 2 semis + final, plus optional
// 3rd-place playoff in 2010. Layout follows Wikipedia's IPL playoff brackets:
// two semis stacked left, final on the right, 3rd-place below if present.
function renderClassicBracket(data, teamIndex, playoffs, semis) {
    const seedMap = new Map();
    (data.team_table || []).forEach(t => seedMap.set(t.team, t.position_est));
    const seedOf = (t) => seedMap.get(t) || 99;

    const final = playoffs.find(p => p.stage === 'Final');
    const thirdPlace = playoffs.find(p => p.stage === '3rd Place Play-Off');
    const champ = final ? final.winner : null;

    const fmtDate = (iso) => {
        if (!iso) return '';
        const parts = iso.split('-');
        if (parts.length < 3) return iso;
        const months = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return `${parseInt(parts[2], 10)} ${months[parseInt(parts[1], 10)] || ''}`;
    };

    const link = (matchId, content) =>
        `<a class="brk-cell-link" data-match-id="${matchId}" href="match.html?id=${matchId}">${content}</a>`;

    // One match = a 3-column mini-table with header / date / two team rows.
    // Reuses brk-* classes so styling, hover, and click match the modern bracket.
    const matchTable = (label, match, opts = {}) => {
        const ordered = [...match.teams].sort((a, b) => seedOf(a) - seedOf(b));
        const teamRow = (team) => {
            const isW = match.winner === team;
            const score = (match.scores || {})[team] || '';
            const seed = seedOf(team);
            const label = bracketLabel(team, data, teamIndex);
            return `
                <tr>
                    <td class="brk-td brk-bgD brk-center${isW ? ' winner' : ''}" style="border-width:1px">${link(match.match_id, isW ? `<b>${seed}</b>` : seed)}</td>
                    <td class="brk-td brk-bgL${isW ? ' winner' : ''}" style="border-width:1px">${link(match.match_id, isW ? `<b>${label}</b>` : label)}</td>
                    <td class="brk-td brk-bgL brk-center${isW ? ' winner' : ''}" style="border-width:1px">${link(match.match_id, isW ? `<b>${score}</b>` : score)}</td>
                </tr>
            `;
        };
        return `
            <table class="brk-tbl brk-classic-match">
                <colgroup>
                    <col style="width:30px"/>
                    <col style="width:165px"/>
                    <col style="width:75px"/>
                </colgroup>
                <tbody>
                    <tr><td colspan="3" class="brk-td brk-bgD brk-center brk-header" style="border-width:1px"><b>${label}</b></td></tr>
                    <tr><td colspan="3" class="brk-date">${fmtDate(match.date)}</td></tr>
                    ${teamRow(ordered[0])}
                    ${teamRow(ordered[1])}
                </tbody>
            </table>
        `;
    };

    const main = `
        <div class="brk-wrap">
            <div class="brk-classic">
                <div class="brk-classic-col">
                    ${matchTable('Semi Final 1', semis[0])}
                    ${matchTable('Semi Final 2', semis[1])}
                </div>
                <div class="brk-classic-connector" aria-hidden="true"></div>
                <div class="brk-classic-col brk-classic-col-final">
                    ${matchTable('Final', final)}
                </div>
            </div>
            ${thirdPlace ? `
                <div class="brk-classic-third">
                    ${matchTable('3rd Place Play-Off', thirdPlace)}
                </div>
            ` : ''}
            ${champ ? `<div class="bracket-champion">🏆 ${teamLink(champ, data.season, teamIndex)}</div>` : ''}
        </div>
    `;
    return main;
}

function renderModernBracket(data, teamIndex, byStage) {
    const seedMap = new Map();
    (data.team_table || []).forEach(t => seedMap.set(t.team, t.position_est));

    const TBD = 'TBD';
    // IPL page-playoff structure fixes who feeds each later round, so a match
    // that hasn't been played yet (or that Cricsheet hasn't published yet) can
    // still be shown as a placeholder with its known feeder teams:
    //   Qualifier 2 = Qualifier 1 loser  vs  Eliminator winner
    //   Final       = Qualifier 1 winner vs  Qualifier 2 winner
    // Placeholder matches carry match_id=null (not clickable), no winner
    // highlight, and a "to be played" label in place of a date/scores.
    const ph = (stage, teams) => ({
        stage, teams, winner: null, scores: {}, match_id: null, date: null, placeholder: true,
    });

    const q1 = byStage['Qualifier 1'] || ph('Qualifier 1', [TBD, TBD]);
    const elim = byStage['Eliminator'] || ph('Eliminator', [TBD, TBD]);

    const q1W = q1.placeholder ? null : q1.winner;
    const q1L = q1W ? (q1.teams.find(t => t !== q1W) || null) : null;
    const eW = elim.placeholder ? null : elim.winner;

    const q2 = byStage['Qualifier 2'] || ph('Qualifier 2', [q1L || TBD, eW || TBD]);
    const q2W = q2.placeholder ? null : q2.winner;

    const final = byStage['Final'] || ph('Final', [q1W || TBD, q2W || TBD]);
    const champ = final.placeholder ? null : final.winner;

    const seedOf = (t) => seedMap.get(t) || 99;
    const orderBySeed = (teams) => [...teams].sort((a, b) => seedOf(a) - seedOf(b));
    const orderByList = (teams, preferred) => {
        const result = [];
        for (const p of preferred) if (teams.includes(p) && !result.includes(p)) result.push(p);
        for (const t of teams) if (!result.includes(t)) result.push(t);
        return result;
    };
    const q1Order = orderBySeed(q1.teams);
    const elimOrder = orderBySeed(elim.teams);
    const q2Order = orderByList(q2.teams, [q1L, eW]);
    const finalOrder = orderByList(final.teams, [q1W, q2W]);

    const fmtDate = (iso) => {
        if (!iso) return '';
        const parts = iso.split('-');
        if (parts.length < 3) return iso;
        const months = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return `${parseInt(parts[2], 10)} ${months[parseInt(parts[1], 10)] || ''}`;
    };
    // Show date alone — full venue lives in the Matches table. Some Cricsheet
    // venues lack a comma-separated city (e.g. the Visakhapatnam stadium) and
    // would overflow the bracket cells, so don't try to inline them here.
    const dateVenue = (m) => fmtDate(m.date);

    // Each match cell is wrapped in <a href="match.html?id=X"> so the box is
    // clickable and right-clickable. Three sibling anchors (one per td) share
    // a hover state via data-match-id + initBracketHover() handler — the
    // bracket layout uses rowspan/colspan such that no clean parent wraps each
    // match, so a CSS-only sibling selector can't express the highlight.
    //
    // borders is "T R B L" (top right bottom left) in px values like "1px 1px 1px 1px".
    // Placeholder cells have no match_id, so they render as plain (un-clickable) content.
    const link = (matchId, content) =>
        matchId
            ? `<a class="brk-cell-link" data-match-id="${matchId}" href="match.html?id=${matchId}">${content}</a>`
            : content;
    const seedCell = (seed, isW, matchId, borders, ph) =>
        `<td class="brk-td brk-bgD brk-center${isW ? ' winner' : ''}${ph}" rowspan="2" style="border-width:${borders}">${link(matchId, isW ? `<b>${seed}</b>` : String(seed))}</td>`;
    const teamCell = (team, isW, matchId, borders, ph) =>
        `<td class="brk-td brk-bgL${isW ? ' winner' : ''}${ph}" rowspan="2" style="border-width:${borders}">${link(matchId, isW ? `<b>${team}</b>` : team)}</td>`;
    const scoreCell = (score, isW, matchId, borders, ph) =>
        `<td class="brk-td brk-bgL brk-center${isW ? ' winner' : ''}${ph}" rowspan="2" style="border-width:${borders}">${link(matchId, isW ? `<b>${score}</b>` : score)}</td>`;
    const matchTriple = (label, team, match, isFirst) => {
        const isW = !match.placeholder && match.winner === team;
        const score = (match.scores || {})[team] || '';
        const ph = match.placeholder ? ' brk-ph' : '';
        const seedLeft = isFirst ? '1px' : '0px';
        const seedTop = isFirst ? '1px' : '0px';
        return seedCell(label, isW, match.match_id, `${seedTop} 1px 1px ${seedLeft}`, ph)
             + teamCell(bracketLabel(team, data, teamIndex), isW, match.match_id, `${seedTop} 0px 1px 0px`, ph)
             + scoreCell(score, isW, match.match_id, `${seedTop} 1px 1px 0px`, ph);
    };
    const headerCell = (label) =>
        `<td class="brk-td brk-bgD brk-center brk-header" colspan="3" rowspan="2" style="border-width:1px 1px 1px 1px"><b>${label}</b></td>`;
    const dateCell = (m) =>
        `<td class="brk-date" colspan="3" rowspan="2">${m.placeholder ? 'to be played' : dateVenue(m)}</td>`;

    // 14-column, 18-row table porting Wikipedia's Page-playoff bracket.
    // Column widths: 1, 22, 165, 95, 4, 2, 22, 165, 95, 4, 2, 22, 165, 95.
    // Cells with explicit border styles draw the connector lines.
    const inner = `
<div class="brk-wrap">
<table class="brk-tbl">
<colgroup>
  <col style="width:1px"/>
  <col style="width:22px"/><col style="width:165px"/><col style="width:95px"/>
  <col style="width:4px"/><col style="width:2px"/>
  <col style="width:22px"/><col style="width:165px"/><col style="width:95px"/>
  <col style="width:4px"/><col style="width:2px"/>
  <col style="width:22px"/><col style="width:165px"/><col style="width:95px"/>
</colgroup>
<tbody>
  <!-- Row 1: section headers -->
  <tr>
    <td style="height:11px"></td>
    ${headerCell('Qualifier 1 / Eliminator')}
    <td rowspan="5"></td><td rowspan="5"></td>
    ${headerCell('Qualifier 2')}
    <td rowspan="5"></td><td rowspan="5"></td>
    ${headerCell('Final')}
  </tr>
  <tr><td style="height:11px"></td></tr>
  <!-- Row 3: dates for Q1 + Final -->
  <tr>
    <td style="height:11px"></td>
    ${dateCell(q1)}
    <td colspan="3" rowspan="2"></td>
    ${dateCell(final)}
  </tr>
  <tr><td style="height:11px"></td></tr>
  <!-- Row 5: Q1 team1 + connector to Final + Final team1 (Q1W) -->
  <tr>
    <td style="height:11px"></td>
    ${matchTriple(seedOf(q1Order[0]), q1Order[0], q1, true)}
    <td colspan="3" rowspan="2" class="brk-line" style="border-width:0 0 2px 0"></td>
    ${matchTriple('Q1W', finalOrder[0], final, true)}
  </tr>
  <tr>
    <td style="height:11px"></td>
    <td class="brk-line" style="border-width:0 0 2px 0"></td>
    <td class="brk-line" style="border-width:0 0 2px 0"></td>
    <td class="brk-line" style="border-width:0 0 2px 0"></td>
    <td class="brk-line" style="border-width:0 0 2px 0"></td>
  </tr>
  <!-- Row 7: Q1 team2, connectors, Q2 date, Final team2 (Q2W) -->
  <tr>
    <td style="height:11px"></td>
    ${matchTriple(seedOf(q1Order[1]), q1Order[1], q1, false)}
    <td class="brk-line-loser" style="border-width:2px 2px 0 0"></td>
    <td></td>
    ${dateCell(q2)}
    <td class="brk-line" style="border-width:0 2px 0 0"></td>
    <td class="brk-line" style="border-width:1px 0 0 0"></td>
    ${matchTriple('Q2W', finalOrder[1], final, false)}
  </tr>
  <tr>
    <td style="height:11px"></td>
    <td rowspan="2" class="brk-line-loser" style="border-width:0 2px 0 0"></td>
    <td rowspan="2"></td>
    <td rowspan="2" class="brk-line" style="border-width:0 2px 0 0"></td>
    <td rowspan="2"></td>
  </tr>
  <!-- Row 9: Q2 team1 (Q1L) -->
  <tr>
    <td style="height:11px"></td>
    <td colspan="3" rowspan="2"></td>
    ${matchTriple('Q1L', q2Order[0], q2, true)}
    <td colspan="3" rowspan="2"></td>
  </tr>
  <tr>
    <td style="height:11px"></td>
    <td class="brk-line-loser" style="border-width:0 2px 0 0"></td>
    <td class="brk-line-loser" style="border-width:0 0 2px 0"></td>
    <td class="brk-line" style="border-width:0 2px 2px 0"></td>
    <td></td>
  </tr>
  <!-- Row 11: Eliminator date + Q2 team2 (EW) -->
  <tr>
    <td style="height:11px"></td>
    ${dateCell(elim)}
    <td class="brk-line" style="border-width:0 2px 0 0"></td>
    <td class="brk-line" style="border-width:2px 0 0 0"></td>
    ${matchTriple('EW', q2Order[1], q2, false)}
    <td class="brk-line" style="border-width:1px 0 0 0"></td>
    <td></td>
    <td colspan="3" rowspan="2"></td>
  </tr>
  <tr>
    <td style="height:11px"></td>
    <td rowspan="2" class="brk-line" style="border-width:0 2px 0 0"></td>
    <td rowspan="2"></td>
    <td rowspan="4"></td>
    <td rowspan="4"></td>
  </tr>
  <!-- Row 13: Eliminator team1 -->
  <tr>
    <td style="height:11px"></td>
    ${matchTriple(seedOf(elimOrder[0]), elimOrder[0], elim, true)}
    <td colspan="3" rowspan="4"></td>
    <td colspan="3" rowspan="2"></td>
  </tr>
  <tr>
    <td style="height:11px"></td>
    <td class="brk-line" style="border-width:0 2px 2px 0"></td>
    <td></td>
  </tr>
  <!-- Row 15: Eliminator team2 -->
  <tr>
    <td style="height:11px"></td>
    ${matchTriple(seedOf(elimOrder[1]), elimOrder[1], elim, false)}
    <td class="brk-line" style="border-width:1px 0 0 0"></td>
    <td></td>
    <td colspan="3" rowspan="2"></td>
  </tr>
  <tr>
    <td style="height:11px"></td>
    <td></td><td></td><td></td><td></td>
  </tr>
</tbody>
</table>
${champ ? `<div class="bracket-champion">🏆 ${teamLink(champ, data.season, teamIndex)}</div>` : ''}
</div>
    `;
    return inner;
}

loadSeason();
</script>
</body>
</html>
