<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The TILT — Match</title>
    <link rel="stylesheet" href="style.css">
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');</script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
    <nav class="top-nav"></nav>
    <script src="common.js"></script>
    <script>initNav(null);</script>

    <div class="container">
        <div id="content">
            <div class="loading">loading match...</div>
        </div>

        <div class="footer">
            data from <a href="https://cricsheet.org">cricsheet.org</a> |
            <a href="index.html">back to leaderboard</a>
        </div>
    </div>

<script>
async function loadMatch() {
    const params = new URLSearchParams(window.location.search);
    const matchId = params.get('id');

    if (!matchId) {
        document.getElementById('content').innerHTML = '<div class="loading">no match specified</div>';
        return;
    }

    try {
        const [res, teamIndex] = await Promise.all([
            fetch(`data/matches/${matchId}.json`),
            loadTeamIndex(),
        ]);
        if (!res.ok) throw new Error('not found');
        const m = await res.json();

        document.title = `The TILT — ${m.teams[0]} vs ${m.teams[1]}`;
        const refTeam = m.innings && m.innings.length > 0 ? m.innings[0].batting_team : m.teams[0];
        const teamLnk = (name) => teamLink(name, m.season, teamIndex);

        let html = `
            <div class="match-header">
                <div class="teams">${teamLnk(m.teams[0])} <span class="vs">vs</span> ${teamLnk(m.teams[1])}</div>
                <div class="match-meta">${m.date} | ${m.venue} | ${seasonLink(m.season)}</div>
                ${m.toss_winner ? `<div class="match-meta">${teamLnk(m.toss_winner)} won the toss and chose to ${m.toss_decision}</div>` : ''}
                ${m.winner ? `<div class="result">${teamLnk(m.winner)} won</div>` : ''}
            </div>
        `;

        // Win probability chart
        if (m.balls && m.balls.length > 0) {
            html += `<div class="section"><h3>win probability</h3>
                <div class="chart-container" style="height:280px">
                    <canvas id="wpChart"></canvas>
                </div>
                <div style="color:var(--text-dim);font-size:0.65rem;margin-top:6px">Win probability from ${refTeam}'s perspective (batting team in innings 1)</div>
            </div>`;
        }

        // Key moments
        if (m.key_moments && m.key_moments.length > 0) {
            html += `<div class="section"><h3>key moments</h3>`;
            for (const km of m.key_moments) {
                const desc = km.wicket
                    ? (km.wicket_kind === 'run out'
                        ? `${km.player_dismissed || km.batter} run out`
                        : `${km.player_dismissed || km.batter} ${km.wicket_kind} (${km.bowler})`)
                    : `${km.batter} hits ${km.runs} off ${km.bowler}`;
                const overLabel = `${km.inn === 1 ? '1st' : '2nd'} inn, ${km.over}.${km.ball}`;
                html += `<div class="key-moment">
                    <div>
                        <span style="color:var(--text-dim);font-size:0.75rem;margin-right:8px">${overLabel}</span>
                        <span class="moment-desc">${desc}</span>
                    </div>
                    <div class="moment-delta">${formatTilt(km.delta)}</div>
                </div>`;
            }
            html += '</div>';
        }

        // Innings scorecards
        if (m.innings && m.innings.length > 0) {
            for (const inn of m.innings) {
                html += `<div class="section"><h3>${teamLnk(inn.batting_team)} — ${inn.total} (innings ${inn.innings})</h3>`;

                // Batting card
                html += `<div class="table-wrap"><table class="detail-table">
                    <tr><th>batter</th><th>runs</th><th>balls</th><th>SR</th><th>TILT</th></tr>`;
                for (const b of inn.batting) {
                    const playerLink = b.slug ? `player.html?player=${b.slug}` : '#';
                    html += `<tr>
                        <td><a href="${playerLink}" style="color:var(--text-primary);text-decoration:none;font-weight:500">${b.player}</a></td>
                        <td>${b.runs}</td><td>${b.balls}</td><td>${b.sr}</td><td>${formatTilt(b.tilt)}</td>
                    </tr>`;
                }
                html += '</table></div>';

                // Bowling card
                html += `<div class="table-wrap"><table class="detail-table" style="margin-top:12px">
                    <tr><th>bowler</th><th>overs</th><th>runs</th><th>wkts</th><th>econ</th><th>TILT</th></tr>`;
                for (const b of inn.bowling) {
                    const playerLink = b.slug ? `player.html?player=${b.slug}` : '#';
                    html += `<tr>
                        <td><a href="${playerLink}" style="color:var(--text-primary);text-decoration:none;font-weight:500">${b.player}</a></td>
                        <td>${b.overs}</td><td>${b.runs}</td><td>${b.wickets}</td><td>${b.economy}</td><td>${formatTilt(b.tilt)}</td>
                    </tr>`;
                }
                html += '</table></div></div>';
            }
        }

        document.getElementById('content').innerHTML = html;

        // Render WP chart
        if (m.balls && m.balls.length > 0) {
            const inn1 = m.balls.filter(b => b.inn === 1);
            const inn2 = m.balls.filter(b => b.inn === 2);

            // Build continuous WP line from refTeam's perspective
            const labels = [];
            const wpData = [];

            for (const b of inn1) {
                labels.push(`${b.over}.${b.ball}`);
                wpData.push(+(b.wp_after * 100).toFixed(1));
            }
            for (const b of inn2) {
                labels.push(`${b.over}.${b.ball}`);
                // Inn 2 wp_after is from inn 2 batting team's perspective — flip it
                wpData.push(+((1 - b.wp_after) * 100).toFixed(1));
            }

            // Bridge the innings boundary visually. The model has two predictions
            // for the moment between innings (inn1-last after-state vs inn2-first
            // before-state) and they typically disagree. Insert a midpoint at the
            // boundary so the line passes smoothly through the dashed marker
            // instead of cliff-jumping. Underlying TILT data is unchanged.
            let inningsBreak = inn1.length;
            if (inn1.length > 0 && inn2.length > 0) {
                const inn1_last_bf = inn1[inn1.length - 1].wp_after * 100;
                const inn2_first_before_bf = (1 - inn2[0].wp) * 100;
                const bridge = +((inn1_last_bf + inn2_first_before_bf) / 2).toFixed(1);
                labels.splice(inningsBreak, 0, 'innings break');
                wpData.splice(inningsBreak, 0, bridge);
                inningsBreak += 1;  // shift to point at the new inn2 first index
            }

            // The bridge data point sits at chart index (inningsBreak - 1).
            // Draw the dashed innings-break vertical right through it.
            const bridgeIdx = inningsBreak - 1;
            const inningsBreakLine = {
                id: 'inningsBreakLine',
                afterDatasetsDraw(chart) {
                    if (bridgeIdx <= 0 || bridgeIdx >= chart.data.labels.length) return;
                    const xScale = chart.scales.x;
                    const yScale = chart.scales.y;
                    const x = xScale.getPixelForValue(bridgeIdx);
                    const ctx = chart.ctx;
                    ctx.save();
                    ctx.setLineDash([4, 4]);
                    ctx.lineWidth = 1;
                    ctx.strokeStyle = cssVar('--text-muted');
                    ctx.beginPath();
                    ctx.moveTo(x, yScale.top);
                    ctx.lineTo(x, yScale.bottom);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.fillStyle = cssVar('--text-muted');
                    ctx.font = '10px system-ui, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('innings break', x, yScale.top - 4);
                    ctx.restore();
                }
            };

            new Chart(document.getElementById('wpChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `${refTeam} Win %`,
                        data: wpData,
                        borderColor: wpData.map((_, i) => i < inningsBreak ? cssVar('--accent-green') : cssVar('--accent-red')),
                        segment: {
                            borderColor: ctx => ctx.p0DataIndex < inningsBreak - 1
                                ? cssVar('--accent-green')
                                : cssVar('--accent-red'),
                        },
                        backgroundColor: 'transparent',
                        fill: false,
                        tension: 0.2,
                        pointRadius: 0,
                        pointHoverRadius: 4,
                        borderWidth: 2,
                    }]
                },
                plugins: [inningsBreakLine],
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                title: (items) => {
                                    const i = items[0].dataIndex;
                                    if (i === bridgeIdx) return 'innings break';
                                    const ball_i = i < bridgeIdx ? i : i - 1;
                                    const b = m.balls[ball_i];
                                    if (!b) return '';
                                    return `Inn ${b.inn}, Over ${b.over}.${b.ball}`;
                                },
                                label: (item) => {
                                    const i = item.dataIndex;
                                    if (i === bridgeIdx) {
                                        return `${refTeam}: ${item.formattedValue}% (bridge)`;
                                    }
                                    const ball_i = i < bridgeIdx ? i : i - 1;
                                    const b = m.balls[ball_i];
                                    if (!b) return '';
                                    let line = `${refTeam}: ${item.formattedValue}%`;
                                    if (b.score) line += ` | Score: ${b.score}`;
                                    if (b.wicket) line += ` | WICKET`;
                                    else if (b.runs > 0) line += ` | ${b.runs} runs`;
                                    return line;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            title: { display: true, text: 'Over.Ball', color: cssVar('--text-muted'), font: { size: 11 } },
                            ticks: {
                                color: cssVar('--text-muted'),
                                maxTicksLimit: 20,
                                callback: function(val, idx) {
                                    const label = this.getLabelForValue(val);
                                    return label && label.endsWith('.0') ? label : '';
                                }
                            },
                            grid: { color: cssVar('--border') }
                        },
                        y: {
                            title: { display: true, text: `${refTeam} Win %`, color: cssVar('--text-muted'), font: { size: 11 } },
                            ticks: { color: cssVar('--text-muted'), callback: v => v + '%' },
                            grid: { color: cssVar('--border') },
                            min: 0,
                            max: 100,
                        }
                    }
                }
            });
        }

    } catch (e) {
        document.getElementById('content').innerHTML = '<div class="loading">match not found</div>';
    }
}

loadMatch();
</script>
</body>
</html>
