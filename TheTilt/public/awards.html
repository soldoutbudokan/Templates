<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The TILT | Awards</title>
    <meta name="description" content="Season-by-season TILT award winners across IPL history.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://thetilt-rust.vercel.app/awards.html">
    <meta property="og:title" content="The TILT | Awards">
    <meta property="og:description" content="Season-by-season TILT award winners across IPL history.">
    <meta property="og:image" content="https://thetilt-rust.vercel.app/assets/crest.png">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="The TILT | Awards">
    <meta name="twitter:description" content="Season-by-season TILT award winners across IPL history.">
    <meta name="twitter:image" content="https://thetilt-rust.vercel.app/assets/crest.png">
    <link rel="icon" type="image/svg+xml" href="assets/crest-icon.svg">
    <link rel="alternate icon" type="image/png" href="assets/crest-icon.png">
    <link rel="stylesheet" href="style.css">
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');</script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <nav class="top-nav"></nav>
    <script src="common.js"></script>
    <script>initNav('awards');</script>

    <div class="container">
        <div id="content">
            <div class="loading">loading awards…</div>
        </div>
        <div class="footer">
            data from <a href="https://cricsheet.org">cricsheet.org</a> |
            <a href="index.html">back to TILT</a>
        </div>
    </div>

<script>
// Awards categories — each entry pulls rank-1 from the matching leaders/<season>-<stat>.json.
// Adding a category here is the only change needed to ship more awards.
const AWARDS = [
    { key: 'total_tilt', label: 'TILT MVP',         note: 'highest total TILT',          format: (v) => formatTilt(v),         valueLabel: 'Total TILT' },
    { key: 'runs',       label: 'Most Runs',        note: '',                            format: (v) => String(v),             valueLabel: 'Runs' },
    { key: 'wickets',    label: 'Most Wickets',     note: '',                            format: (v) => String(v),             valueLabel: 'Wickets' },
    { key: 'sr',         label: 'Best Strike Rate', note: 'min 100 balls faced',         format: (v) => Number(v).toFixed(2),  valueLabel: 'Strike Rate' },
    { key: 'economy',    label: 'Best Economy',     note: 'min 100 deliveries',          format: (v) => Number(v).toFixed(2),  valueLabel: 'Economy' },
];

async function fetchTopAward(season, stat) {
    const seasonSlug = season.replace('/', '-');
    try {
        const res = await fetch(`data/leaders/${seasonSlug}-${stat}.json`);
        if (!res.ok) return null;
        const data = await res.json();
        return (data.leaders || [])[0] || null;
    } catch (e) {
        return null;
    }
}

// Lazy-loaded player season match logs. Keyed by `${slug}|${season}`.
const _matchLogCache = new Map();

async function loadPlayerSeasonMatches(slug, season) {
    const key = `${slug}|${season}`;
    if (_matchLogCache.has(key)) return _matchLogCache.get(key);
    const promise = (async () => {
        try {
            const res = await fetch(`data/players/${slug}.json`);
            if (!res.ok) return [];
            const player = await res.json();
            const seasonRow = (player.seasons || []).find((s) => String(s.season) === String(season));
            return (seasonRow && Array.isArray(seasonRow.matches)) ? seasonRow.matches : [];
        } catch (e) {
            return [];
        }
    })();
    _matchLogCache.set(key, promise);
    return promise;
}

function awardRowId(awardKey, season, slug) {
    return `award-${awardKey}-${String(season).replace('/', '-')}-${slug}`;
}

async function toggleAwardRow(awardKey, season, slug, teamIndex) {
    const detailId = awardRowId(awardKey, season, slug) + '-detail';
    const chevId = awardRowId(awardKey, season, slug) + '-chev';
    const detail = document.getElementById(detailId);
    const chev = document.getElementById(chevId);
    if (!detail) return;
    if (detail.style.display !== 'none') {
        detail.style.display = 'none';
        if (chev) chev.classList.remove('open');
        return;
    }
    detail.style.display = '';
    if (chev) chev.classList.add('open');
    const body = detail.querySelector('.award-detail-body');
    if (body && body.dataset.loaded !== 'true') {
        body.innerHTML = '<div class="loading">loading…</div>';
        const matches = await loadPlayerSeasonMatches(slug, season);
        body.innerHTML = renderAwardDetail(matches, season, teamIndex);
        body.dataset.loaded = 'true';
    }
}

function renderAwardDetail(matches, season, teamIndex) {
    if (!matches || matches.length === 0) {
        return `<div class="award-detail-empty">no per-match log found for this player–season</div>
                <div class="award-detail-foot"><a href="season.html?season=${encodeURIComponent(season)}">view ${season} season →</a></div>`;
    }
    const sorted = matches.slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''));
    const rows = sorted.map((m) => {
        // No winner = no result; mirror player.html's W/L/NR mapping (#149).
        const result = m.winner == null
            ? 'NR'
            : (m.winner !== m.opponent ? 'W' : 'L');
        const bat = (m.bat_runs != null) ? `${m.bat_runs}${m.bat_not_out ? '*' : ''}(${m.bat_balls})` : '—';
        const bowl = (m.bowl_wkts != null) ? `${m.bowl_wkts}/${m.bowl_runs} (${ballsToOvers(m.bowl_balls)}ov)` : '—';
        return `<tr>
            <td><a href="match.html?id=${m.match_id}" class="match-link">${m.date}</a></td>
            <td>${teamLink(m.opponent, season, teamIndex)}</td>
            <td class="hide-mobile">${m.team_score || '—'} vs ${m.opponent_score || '—'}</td>
            <td class="hide-mobile">${result}</td>
            <td>${bat}</td>
            <td class="hide-mobile">${bowl}</td>
            <td>${formatTilt(m.total_tilt)}</td>
        </tr>`;
    }).join('');
    return `<table class="match-sub-table">
        <thead><tr><th>Date</th><th>Opponent</th><th class="hide-mobile">Scores</th><th class="hide-mobile">Result</th><th>Bat</th><th class="hide-mobile">Bowl</th><th>TILT</th></tr></thead>
        <tbody>${rows}</tbody>
    </table>
    <div class="award-detail-foot"><a href="season.html?season=${encodeURIComponent(season)}">view ${season} season →</a></div>`;
}

function awardCategoryTable(award, rows, teamIndex) {
    const body = rows.map(({ season, winner }) => {
        if (!winner) {
            return `<tr class="award-empty-row">
                <td>${season}</td>
                <td colspan="3" class="award-empty">no qualifier</td>
                <td></td>
            </tr>`;
        }
        const rowId = awardRowId(award.key, season, winner.slug);
        return `<tr class="award-row" onclick="toggleAwardRow('${award.key}', '${season}', '${winner.slug}', _teamIndex)">
                <td>${season}</td>
                <td><a href="player.html?player=${winner.slug}" onclick="event.stopPropagation()">${flagSpan(winner.country)}${winner.player}</a></td>
                <td>${teamLink(winner.team, season, teamIndex, { cls: 'team-link-subtle' })}</td>
                <td>${award.format(winner.value)}</td>
                <td><span class="season-chevron" id="${rowId}-chev">&#9654;</span></td>
            </tr>
            <tr class="award-detail-row" id="${rowId}-detail" style="display:none">
                <td colspan="5"><div class="award-detail-body" data-loaded="false"></div></td>
            </tr>`;
    }).join('');

    return `<section class="awards-table-section" id="award-${award.key}">
        <h2 class="awards-category-title">${award.label}<span class="awards-category-note">${award.note ? ' · ' + award.note : ''}</span></h2>
        <div class="table-wrap">
            <table class="detail-table awards-table">
                <thead><tr>
                    <th>Season</th><th>Player</th><th>Team</th><th>${award.valueLabel}</th><th></th>
                </tr></thead>
                <tbody>${body}</tbody>
            </table>
        </div>
    </section>`;
}

let _teamIndex = null;

async function loadAwards() {
    _teamIndex = await loadTeamIndex();

    let seasons = [];
    try {
        const m = await (await fetch('data/meta.json')).json();
        seasons = (m.seasons || []).slice().reverse();
    } catch (e) {}

    if (seasons.length === 0) {
        document.getElementById('content').innerHTML = '<div class="loading">no seasons available</div>';
        return;
    }

    const seasonStrip = AWARDS.map((a) =>
        `<a href="#award-${a.key}" class="picker-chip">${a.label}</a>`
    ).join('');

    const headerHtml = `
        <div class="page-header">
            <h1>Awards</h1>
            <div class="subtitle">season-by-season top performers across the headline categories. click any row to expand the player's full season game log.</div>
        </div>
        <div class="awards-season-strip">${seasonStrip}</div>
    `;

    document.getElementById('content').innerHTML = headerHtml + '<div id="awards-body"><div class="loading">loading…</div></div>';
    const body = document.getElementById('awards-body');

    // Fetch in parallel: for each season × each award, pull rank-1.
    const seasonPayloads = await Promise.all(seasons.map(async (season) => {
        const winners = await Promise.all(AWARDS.map((a) => fetchTopAward(season, a.key)));
        return { season, winners };
    }));

    // Pivot from per-season to per-category for table rendering.
    body.innerHTML = AWARDS.map((award, awardIdx) => {
        const rows = seasonPayloads.map(({ season, winners }) => ({
            season, winner: winners[awardIdx],
        }));
        return awardCategoryTable(award, rows, _teamIndex);
    }).join('');
}

loadAwards();
</script>
</body>
</html>
