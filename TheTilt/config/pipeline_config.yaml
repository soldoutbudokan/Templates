# The TILT Pipeline Configuration

data:
  source_url: "https://cricsheet.org/downloads/ipl_json.zip"
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  ball_events_file: "ball_events.parquet"
  featured_balls_file: "featured_balls.parquet"

model:
  # Loosened from (depth=4, min_child=500, leaves=16, lambda=5.0) so the model
  # can carve sharper endpoint splits — tail of inn2 was averaging wp=0.79 on
  # winning chases (truth 1.0) and 0.16 on losing (truth 0.0), forcing
  # apply_match_terminal_snap to dump that whole gap onto the bowler of the
  # last ball. With more capacity at the boundary, predictions push closer to
  # 0/1 naturally and the snap is no longer needed.
  n_estimators: 2000
  learning_rate: 0.03
  max_depth: 6
  min_child_samples: 100
  num_leaves: 64
  reg_lambda: 1.0
  test_size: 0.2
  random_state: 42
  save_path: "models/win_prob_lgbm.pkl"

export:
  output_dir: "public/data"
  rankings_file: "tilt_rankings.json"
  players_dir: "players"
  meta_file: "meta.json"
  min_matches: 10  # Minimum matches to appear in rankings
  min_role_balls: 50  # Minimum balls to show per-role TILT (batting/bowling)
