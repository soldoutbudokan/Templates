# Hand-maintained supplement for "no result" matches that the cricsheet raw
# data does not capture.
#
# Background: pipeline/parse_matches.parse_no_results_from_raw() scans the
# raw cricsheet JSONs for `outcome.result == "no result"`. That works for
# matches where some balls were bowled before abandonment, but cricsheet
# does NOT publish a JSON file at all for matches abandoned without a ball
# bowled. Those matches therefore disappear from the points table unless
# we add them here. (See dependencies.md.)
#
# `add` rows are appended to the no-results dataframe (treated as 1 NR
# each for both teams in the season standings).
# `exclude` rows drop a cricsheet "no result" entry from the dataframe —
# used when a match was abandoned mid-game and later replayed as a
# separate fixture (so the replay is the canonical match for the standings
# and the original NR is voided).
#
# Cross-referenced against the Wikipedia league-stage points table for
# every IPL season. Any team whose W/L/NR row in the regenerated
# `seasons/{season}.json` does not match Wikipedia after running the
# pipeline likely needs an entry here (or has a separate cricsheet data
# gap for a real played match, which is out of scope for this file).
#
# Use canonical team names (per config/team_aliases.yaml). If a cricsheet
# alias is used it is normalized at parse time, but canonical is preferred
# for readability.

add:
  - season: "2008"
    date: "2008-05-22"
    team1: "Delhi Capitals"
    team2: "Kolkata Knight Riders"
    venue: "Feroz Shah Kotla, Delhi"

