exclude:
  # PBKS vs DC was abandoned mid-game on 2025-05-08 (cricsheet match_id
  # 1473495, outcome.result == "no result"). The IPL rescheduled and
  # replayed it on 2025-05-24 as match_id 1485779 (DC won). The replay is
  # the canonical fixture for the points table; voiding the original NR
  # so PBKS and DC each get credited for the May 24 result only.
  - match_id: "1473495"
    reason: "Abandoned mid-game on 2025-05-08; rescheduled and replayed 2025-05-24 (match_id 1485779). The replay is the canonical fixture in Wikipedia's points table."
