# Seasons whose final has been played. Any season NOT listed is treated as
# in-progress, and `seasons/{season}.json:champion` is exported as null even
# though a "winner of the last completed match" placeholder exists.
#
# When a new season's final concludes, append the season string here and
# re-run `refresh_tilt_data_only` (or any pipeline export) so the champion
# field flips on. See TheTilt/dependencies.md for the full reverse map.
